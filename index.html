      const getEmptyNursingRecord = () => ({
        serviceData: { self: {}, manager: {}, storeManager: {} },

        isServiceComplete: false, isSafetyComplete: false
      });

      const getEmptyCounterRecord = () => ({
        evaluatorTitle: '', evaluatorName: '', evaluateDate: new Date().toISOString().split('T')[0],
        scores: {}, feedback: '', isComplete: false
      });

      const calculateNursingBonus = (record) => {
        let serviceBonus = 0; let safetyBonus = 0;
        if (record) {
          if (record.isServiceComplete) {
            const finalServiceScore = Object.values(record.serviceData?.storeManager || {}).reduce((sum, val) => sum + (val || 0), 0);
            if (finalServiceScore === 10) serviceBonus = 3000; else if (finalServiceScore >= 7) serviceBonus = 1500;
          }
          if (record.isSafetyComplete) {
            let redFailCount = 0; let blackFailCount = 0;
            SAFETY_SECTIONS.forEach(sec => sec.categories.forEach(cat => cat.items.forEach(item => {
              if (record.safetyData?.[item.id] === 'fail') { if (item.isRed) redFailCount++; else blackFailCount++; }
            })));
            if (redFailCount > 0) safetyBonus = 0; 
            else if (blackFailCount === 0) safetyBonus = 3000; 
            else if (blackFailCount <= 5) safetyBonus = 1500; 
            else safetyBonus = 0;
          }
        }
        return { serviceBonus, safetyBonus, total: serviceBonus + safetyBonus };
      };

      const calculateCounterBonus = (avgScore) => {
        if (avgScore < 3) return 0;
        if (avgScore < 4) return 1000;
        if (avgScore < 5) return 2000;
        return 3000;
      };

      const calculateDirectorBonus = (avgScore) => {
        if (avgScore < 3) return 0;
        if (avgScore < 4) return 2000;
        if (avgScore < 5) return 3000;
        return 4000;
      };

      const getCounterStaffSummary = (rec, expectedCount) => {
        if (!rec || !rec.evaluations) return { isComplete: false, avgScore: 0, evalCount: 0, bonus: 0 };
        const evals = Object.values(rec.evaluations).filter(e => e.isComplete);
        const evalCount = evals.length;
        if (evalCount === 0) return { isComplete: false, avgScore: 0, evalCount: 0, bonus: 0 };
        
        let totalAvg = 0;
        evals.forEach(e => {
          const sum = Object.values(e.scores || {}).reduce((a, b) => a + b, 0);
          totalAvg += (sum / 5);
        });
        const avgScore = parseFloat((totalAvg / evalCount).toFixed(1));
        const bonus = calculateCounterBonus(avgScore);
        
        return { isComplete: evalCount >= expectedCount, avgScore, evalCount, bonus };
      };

      // --- 截圖與PDF專用防裁切過濾器 (DOM替身技術) ---
      const replaceInputsWithDivs = (container) => {
        const inputs = container.querySelectorAll('input:not([type="checkbox"]):not([type="radio"]), select, textarea');
        const replacements = [];
        inputs.forEach(input => {
          if (window.getComputedStyle(input).display === 'none') return;
          const replacement = document.createElement('div');
          let text = input.value || '';
          if (input.tagName.toLowerCase() === 'select') {
            text = input.options[input.selectedIndex]?.text || '';
          }
          replacement.innerText = text;
          const style = window.getComputedStyle(input);
          
          replacement.style.cssText = `
            display: flex;
            align-items: center;
            justify-content: ${style.textAlign === 'center' || input.classList.contains('text-center') ? 'center' : 'flex-start'};
            width: ${style.width};
            height: ${style.height};
            min-height: ${style.minHeight};
            padding: ${style.padding};
            margin: ${style.margin};
            font-size: ${style.fontSize};
            font-family: ${style.fontFamily};
            font-weight: ${style.fontWeight};
            color: ${style.color};
            background-color: ${style.backgroundColor};
            border: ${style.border};
            border-radius: ${style.borderRadius};
            box-sizing: border-box;
            white-space: ${input.tagName.toLowerCase() === 'textarea' ? 'pre-wrap' : 'nowrap'};
            overflow: hidden;
          `;
          
          input.style.setProperty('display', 'none', 'important');
          input.parentNode.insertBefore(replacement, input);
          replacements.push({ original: input, replacement });
        });
        return replacements;
      };

      const restoreInputs = (replacements) => {
        replacements.forEach(({ original, replacement }) => {
          if (replacement.parentNode) {
            replacement.parentNode.removeChild(replacement);
          }
          original.style.display = '';
        });
      };

                  <button onClick={() => captureScreenshot('counter-form-panel', `櫃台客服評核_${staff}`)} className="text-sm bg-sky-600 text-white px-3 py-1 rounded-lg hover:bg-sky-500 transition shadow-sm font-bold flex items-center gap-1">📸 儲存圖片</button>
                  {isSuperAdmin && <button onClick={handleResetCounter} className="text-sm bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-400 transition shadow-sm font-bold flex items-center gap-1">🔄 重置</button>}
                </div>
                <h2 className="font-bold text-lg leading-tight text-center">櫃台客服評核<br/><span className="text-xs font-normal text-teal-200">{brand} - {branch}</span></h2>

                   <button onClick={() => exportPDF('counter-form-panel', `櫃台客服評核_${staff}`)} className="text-sm bg-indigo-600 px-3 py-1 rounded-lg hover:bg-indigo-500 transition shadow-sm font-bold flex items-center gap-1">📄 匯出 PDF</button>

                     <div><label className="text-xs font-bold text-slate-500 block mb-1">評核人姓名</label><input disabled type="text" value={evaluatorName || ''} className="w-full border border-slate-200 p-2 rounded-lg outline-none bg-slate-100 text-slate-500 font-bold" /></div>
                     <div><label className="text-xs font-bold text-slate-500 block mb-1">評核日期</label><input disabled={isReadOnlyMode} type="date" value={counterData.evaluateDate || new Date().toISOString().split('T')[0]} onChange={e=>setCounterData({...counterData, evaluateDate: e.target.value})} className="w-full border border-slate-300 p-2 rounded-lg outline-none bg-white focus:border-teal-500"/></div>

                <div className="bg-slate-50 rounded-xl shadow-sm p-4 mb-4 flex justify-between items-center border-l-4 border-teal-600 print:shadow-none border border-slate-200">

                </div>

                <div className="space-y-6 print:space-y-4">
                  {COUNTER_QUESTIONS.map((q) => (
                    <div key={q.id} className="bg-slate-50 p-5 rounded-xl shadow-sm border border-slate-200 print:shadow-none print:border-slate-300 print:break-inside-avoid">

              <div className="fixed bottom-0 w-full max-w-3xl bg-slate-50 border-t border-slate-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] flex gap-3 no-print z-30">

                 <button onClick={handleCounterSaveAndReturn} className={`${isReadOnlyMode ? 'w-full bg-slate-600 hover:bg-slate-700' : 'w-2/3 bg-teal-700 hover:bg-teal-800'} text-white font-bold py-3 rounded-xl shadow-lg transition-colors`}>

                 </button>
              </div>
            </div>

        // ==========================
        //  RENDER 3: 服務品質評核
        // ==========================
        const renderServiceQuality = () => {
          const calculateScore = (roleData) => Object.values(roleData).reduce((sum, val) => sum + (val || 0), 0);

            <div id="service-quality-panel" className="max-w-3xl mx-auto bg-slate-100 min-h-screen pb-24 print:bg-white print:pb-0 print-panel">

                   {isSuperAdmin && <button onClick={() => handleResetNursing('service')} className="text-sm bg-red-600 px-3 py-1 rounded-lg hover:bg-red-500 transition shadow-sm font-bold flex items-center gap-1">🔄 重置</button>}
                </div>
                <h2 className="font-bold text-lg">服務品質評核</h2>
                <div className="flex gap-2 no-print">

                  <button onClick={() => handleRoleSwitch('self')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition ${authRole === 'self' ? 'bg-sky-100 text-sky-800 shadow-sm' : 'text-slate-500 hover:bg-slate-100'}`}>1. 同仁自評 {serviceSignatures.selfSubmitted && <span className="text-emerald-500 ml-1">✅</span>}</button>

                  <div className="text-right"><p className="text-sm text-slate-500">目前總分</p><p className="font-bold text-3xl text-sky-700">{calculateScore(serviceData[authRole])}<span className="text-lg text-slate-400">/10</span></p></div>

                            {(authRole === 'manager' || authRole === 'storeManager') && <span className={`px-2 py-1 rounded ${serviceData.manager[q.id] ? 'bg-emerald-50 text-emerald-700 font-bold' : 'bg-slate-100 text-slate-500'}`}>主管: {serviceData.manager[q.id] ? '達標' : '未達'}</span>}
                          </div>
                        )}
                        <button disabled={isReadOnlyMode} onClick={() => setServiceData(prev => ({ ...prev, [authRole]: { ...prev[authRole], [q.id]: isChecked ? 0 : 1 } }))} className={`w-full py-3 rounded-lg font-bold border-2 transition-all flex items-center justify-center gap-2 ${isChecked ? 'bg-sky-50 border-sky-500 text-sky-700' : 'bg-white border-slate-200 text-slate-400'} ${isReadOnlyMode ? 'opacity-80 cursor-not-allowed' : 'hover:border-sky-300'} print:py-2 print:border`}>
                          <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${isChecked ? 'border-sky-500 bg-sky-500' : 'border-slate-300'}`}>{isChecked && <svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7" /></svg>}</div>{isChecked ? '已達標 (獲得 1 分)' : '點擊設定為達標'}

                      </div>
                    );
                  })}
                </div>
                <div className="bg-slate-50 p-5 rounded-xl shadow-sm border border-slate-200 mt-6 mb-8 print:shadow-none print:break-inside-avoid">

                  {authRole === 'self' && (
                    <div className="flex flex-col gap-4">
                      <div className="flex items-center gap-4"><label className="text-sm font-bold text-slate-600">自評日期</label><input disabled={isReadOnlyMode} type="date" value={serviceSignatures.selfDate} onChange={e => setServiceSignatures({...serviceSignatures, selfDate: e.target.value})} className={`border border-slate-300 rounded-lg p-2 flex-1 print:border-none outline-none focus:border-sky-500 ${isReadOnlyMode ? 'bg-slate-50' : 'bg-white'}`} /></div>

                  {authRole === 'manager' && (
                    <div className="flex flex-col gap-4">
                      <div className="flex items-center gap-4"><label className="text-sm font-bold text-slate-600 w-16">主管姓名</label><input disabled={isReadOnlyMode} type="text" value={serviceSignatures.managerName} onChange={e => setServiceSignatures({...serviceSignatures, managerName: e.target.value})} className={`border border-slate-300 rounded-lg p-2 flex-1 print:border-none outline-none focus:border-sky-500 ${isReadOnlyMode ? 'bg-slate-50' : 'bg-white'}`} /></div>
                      <div className="flex items-center gap-4"><label className="text-sm font-bold text-slate-600 w-16">評核日期</label><input disabled={isReadOnlyMode} type="date" value={serviceSignatures.managerDate} onChange={e => setServiceSignatures({...serviceSignatures, managerDate: e.target.value})} className={`border border-slate-300 rounded-lg p-2 flex-1 print:border-none outline-none focus:border-sky-500 ${isReadOnlyMode ? 'bg-slate-50' : 'bg-white'}`} /></div>
                      <button disabled={isReadOnlyMode} onClick={() => { setServiceSignatures({...serviceSignatures, managerSubmitted: true}); setSysModal({show:true, msg:'主管評核已送出', type:'alert'}); }} className={`py-3 rounded-lg font-bold text-white shadow-sm no-print ${serviceSignatures.managerSubmitted ? 'bg-emerald-600' : 'bg-sky-700 hover:bg-sky-800'} transition-colors ${isReadOnlyMode ? 'opacity-50' : ''}`}>{serviceSignatures.managerSubmitted ? '✅ 主管評核已送出' : '確認主管評核並送出'}</button>
                    </div>
                  )}
                  {authRole === 'storeManager' && (
                    <div className="flex flex-col gap-4">
                      <div className="flex items-center gap-4"><label className="text-sm font-bold text-slate-600 w-20">店經理姓名</label><input disabled={isReadOnlyMode} type="text" value={serviceSignatures.storeManagerName} onChange={e => setServiceSignatures({...serviceSignatures, storeManagerName: e.target.value})} className={`border border-slate-300 rounded-lg p-2 flex-1 print:border-none outline-none focus:border-sky-500 ${isReadOnlyMode ? 'bg-slate-50' : 'bg-white'}`} /></div>
                      <div className="flex items-center gap-4"><label className="text-sm font-bold text-slate-600 w-20">核決日期</label><input disabled={isReadOnlyMode} type="date" value={serviceSignatures.storeManagerDate} onChange={e => setServiceSignatures({...serviceSignatures, storeManagerDate: e.target.value})} className={`border border-slate-300 rounded-lg p-2 flex-1 print:border-none outline-none focus:border-sky-500 ${isReadOnlyMode ? 'bg-slate-50' : 'bg-white'}`} /></div>
                      <div className="mt-2 border-t border-slate-200 pt-3 print:pt-4"><label className="text-sm font-bold text-slate-600 block mb-2">📝 總結評語</label><textarea disabled={isReadOnlyMode} rows="3" value={serviceSignatures.storeManagerComment} onChange={e => setServiceSignatures({...serviceSignatures, storeManagerComment: e.target.value})} className={`w-full border border-slate-300 rounded-lg p-3 resize-none print:border-none outline-none focus:border-sky-500 ${isReadOnlyMode ? 'bg-slate-50' : 'bg-white'}`}></textarea></div>
                      <button disabled={isReadOnlyMode} onClick={() => { setServiceSignatures({...serviceSignatures, storeManagerSubmitted: true}); setSysModal({show:true, msg:'店經理核決已送出', type:'alert'}); }} className={`py-3 rounded-lg font-bold text-white shadow-sm no-print ${serviceSignatures.storeManagerSubmitted ? 'bg-emerald-600' : 'bg-indigo-700 hover:bg-indigo-800'} transition-colors ${isReadOnlyMode ? 'opacity-50' : ''}`}>{serviceSignatures.storeManagerSubmitted ? '✅ 店經理核決已送出' : '確認店經理核決並送出'}</button>

                  )}

              <div className="fixed bottom-0 w-full max-w-3xl bg-slate-50 border-t border-slate-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] flex gap-3 no-print z-30">
                 {isReadOnlyMode ? (
                   <button onClick={() => setCurrentView('home')} className="w-full bg-slate-600 text-white font-bold py-3 rounded-xl shadow-lg">返回首頁</button>
                 ) : (
                   <React.Fragment>
                     <button onClick={() => saveNursingToRecords(true)} className="w-1/3 bg-sky-50 text-sky-800 font-bold py-3 rounded-xl border border-sky-200 hover:bg-sky-100 transition-colors">暫存進度</button>
                     <button onClick={() => { saveNursingToRecords(false); setCurrentView('home'); }} className="w-2/3 bg-sky-800 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-sky-900 transition-colors">儲存並返回首頁</button>
                   </React.Fragment>
                 )}
              </div>
            </div>
          );
        };

        // ==========================
        //  RENDER 4: 醫療安全評核
        // ==========================
        const renderMedicalSafety = () => {
          const isSafetyDisabled = (safetyMode === 'view' && !isSuperAdmin) || isReadOnlyMode;
          const handleSafetyScore = (qId, status) => { if (isSafetyDisabled) return; setSafetyData(prev => ({ ...prev, [qId]: status })); };
          let answeredCount = 0; SAFETY_SECTIONS.forEach(sec => sec.categories.forEach(cat => cat.items.forEach(item => { if (safetyData[item.id]) answeredCount++; })));

          return (
            <div id="medical-safety-panel" className="max-w-3xl mx-auto bg-slate-100 min-h-screen pb-24 relative print:bg-white print:pb-0">
              <div className="bg-sky-900 text-white p-4 sticky top-0 z-20 shadow-md flex justify-between items-center flex-wrap gap-2">
                <div className="flex items-center gap-2 no-print">
                  <button onClick={() => navigateTo('home')} className="text-sm bg-white/20 px-3 py-1 rounded-lg">返回</button>
                  <button onClick={() => captureScreenshot('medical-safety-panel', `醫療安全評核_${baseInfo.nurse}`)} className="text-sm bg-orange-500 text-white px-3 py-1 rounded-lg hover:bg-orange-400 transition shadow-sm font-bold flex items-center gap-1">📸 儲存圖片</button>
                  {isSuperAdmin && <button onClick={() => handleResetNursing('safety')} className="text-sm bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-400 transition shadow-sm font-bold flex items-center gap-1">🔄 重置</button>}
                </div>
                <div className="text-center"><h2 className="font-bold text-lg leading-tight">醫療安全評核</h2><span className="text-xs text-sky-200">受評：{baseInfo.nurse}</span></div>
                <div className="flex items-center gap-2 no-print">
                  <button onClick={() => exportPDF('medical-safety-panel', `醫療安全評核_${baseInfo.nurse}`)} className="text-sm bg-indigo-600 px-3 py-1 rounded-lg hover:bg-indigo-500 transition shadow-sm font-bold flex items-center gap-1">📄 匯出 PDF</button>
                </div>
              </div>
              
              <div className="bg-slate-50 p-4 mx-4 mt-4 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center print-panel">

                <select disabled={isSafetyDisabled} value={safetySignatures.headNurseName} onChange={e => setSafetySignatures({...safetySignatures, headNurseName: e.target.value})} className={`w-32 px-3 py-2 text-sm text-sky-900 font-bold rounded-lg bg-white ${isSafetyDisabled ? 'opacity-70 border-slate-300' : 'border-2 border-sky-300 outline-none focus:border-sky-500 cursor-pointer'}`}>
                  <option value="">- 請選擇 -</option>{HEAD_NURSES.map(nurse => <option key={nurse} value={nurse}>{nurse}</option>)}
                </select>
              </div>

              <div className={`fixed right-0 top-1/4 z-40 transition-transform duration-300 flex no-print ${isQuickNavOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                 <div onClick={() => setIsQuickNavOpen(!isQuickNavOpen)} className="absolute -left-8 top-4 bg-sky-800 text-white w-8 py-3 rounded-l-lg shadow-lg cursor-pointer flex flex-col items-center justify-center text-xs font-bold gap-1 border border-r-0 border-sky-900">
                   {isQuickNavOpen ? <React.Fragment><span>▶</span><span>收</span><span>起</span></React.Fragment> : <React.Fragment><span>◀</span><span>導</span><span>航</span></React.Fragment>}
                 </div>
                 <div className="bg-white/95 p-2 rounded-bl-xl shadow-lg backdrop-blur-sm border border-r-0 border-slate-200 flex flex-col gap-2 min-w-[100px]">
                   <div className="text-xs font-bold text-slate-500 mb-1 text-center border-b border-slate-200 pb-1">快捷導航</div>
                   {SAFETY_SECTIONS.map((sec, idx) => (
                     <button key={idx} onClick={() => { document.getElementById(sec.id).scrollIntoView({behavior: 'smooth', block: 'start'}); setIsQuickNavOpen(false); }} className="bg-sky-50 text-sky-800 hover:bg-sky-100 text-xs font-bold py-2 px-2 rounded shadow-sm border border-sky-200 transition">{SAFETY_QUICK_NAV[idx]}</button>
                   ))}
                 </div>
              </div>

              {isReadOnlyMode && <div className="bg-purple-100 border-l-4 border-purple-500 p-3 mx-4 mt-4 rounded shadow-sm no-print"><div className="flex gap-2 items-center"><span className="text-purple-700 text-xl">ℹ️</span><p className="text-sm font-bold text-purple-800">目前為人資檢視模式。</p></div></div>}

        //  RENDER 5: 全院儀表板 (橫式總表)

        const renderDashboard = () => (

                        <div className="p-10 text-center text-slate-500 font-bold">該人員本月【尚有表單未完成】，無法結算獎金。</div>
                      ) : (
                        <div className="p-6 space-y-6">
                          <div className="border-b border-slate-200 pb-6">
                            <div className="flex justify-between items-center mb-3"><h3 className="font-bold text-lg text-slate-800"><span className="w-2 h-6 bg-sky-500 rounded-full mr-2 inline-block align-middle"></span>服務品質評核</h3><span className="font-bold text-2xl text-sky-700">{finalServiceScore} <span className="text-sm text-slate-400">分</span></span></div>
                            <div className="bg-slate-100 p-3 rounded-lg flex justify-between items-center border border-slate-200"><span className="font-bold text-slate-600">發放獎金</span><span className="font-bold text-xl text-sky-800">NT$ {bonusInfo.serviceBonus}</span></div>
                          </div>
                          <div>
                            <div className="flex justify-between items-center mb-3"><h3 className="font-bold text-lg text-slate-800"><span className="w-2 h-6 bg-teal-500 rounded-full mr-2 inline-block align-middle"></span>醫療安全評核</h3></div>
                            <div className="grid grid-cols-2 gap-3 mb-4 text-center">
                                <div className={`p-3 rounded-lg border ${redFailCount > 0 ? 'bg-red-50 border-red-200 text-red-700' : 'bg-white border-slate-200 text-slate-600 shadow-sm'}`}><p className="text-xs mb-1 font-bold">🔴 紅字不合格</p><p className="font-black text-2xl">{redFailCount}</p></div>
                                <div className={`p-3 rounded-lg border ${blackFailCount > 5 ? 'bg-orange-50 border-orange-200 text-orange-700' : 'bg-white border-slate-200 text-slate-600 shadow-sm'}`}><p className="text-xs mb-1 font-bold">⚫ 黑字不合格</p><p className="font-black text-2xl">{blackFailCount}</p></div>
                            </div>
                            <div className="bg-slate-100 p-3 rounded-lg flex justify-between items-center border border-slate-200"><span className="font-bold text-slate-600">發放獎金</span><span className="font-bold text-xl text-teal-800">NT$ {bonusInfo.safetyBonus}</span></div>
                          </div>
                        </div>
                      )}
                      {isCalculated && (
                        <div className="bg-indigo-50 p-6 border-t border-indigo-200 flex justify-between items-center"><span className="text-lg font-bold text-indigo-900">總計發放獎金</span><span className="text-3xl font-black text-indigo-700">NT$ {bonusInfo.total}</span></div>
                      )}
                   </div>
                 )}
              </div>
            );
          } else {
            // Counter Report (單店報表，套用橫式表格)
            return (
              <div className="max-w-6xl mx-auto bg-slate-100 min-h-screen p-6 pb-20">
                 <div className="flex justify-between items-center mb-6">
                   <button onClick={() => navigateTo('home')} className="flex items-center text-slate-500 hover:text-slate-800 font-bold transition">返回首頁</button>
                   <div className="flex gap-2">
                     <button onClick={() => captureScreenshot('report-panel', `櫃台單店報表_${counterReportFilter.brand}_${counterReportFilter.month}`)} className="bg-orange-500 text-white font-bold px-4 py-2 rounded-lg text-sm hover:bg-orange-600 transition-colors shadow-sm flex items-center gap-1">📸 儲存圖片</button>
                     <button onClick={exportDashboardToExcel} className="bg-emerald-600 text-white font-bold px-4 py-2 rounded-lg text-sm hover:bg-emerald-700 transition-colors shadow-sm flex items-center gap-1">📊 匯出 Excel</button>
                     <button onClick={() => exportPDF('report-panel', `櫃台單店報表_${counterReportFilter.brand}_${counterReportFilter.month}`)} className="bg-indigo-600 text-white font-bold px-4 py-2 rounded-lg text-sm hover:bg-indigo-700 transition-colors shadow-sm flex items-center gap-1">📄 匯出 PDF</button>
                   </div>
                 </div>
                 <div className="bg-slate-50 p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-wrap gap-3">
                    <div className="flex-1 min-w-[120px]"><label className="text-xs text-slate-500 font-bold">月份</label><select value={counterReportFilter.month} onChange={e => setCounterReportFilter({...counterReportFilter, month: e.target.value, brand: ''})} className="w-full border border-slate-300 p-2 rounded text-sm bg-white outline-none">{MONTHS.map(m => <option key={m} value={m}>{m}</option>)}</select></div>
                    <div className="flex-1 min-w-[120px]"><label className="text-xs text-slate-500 font-bold">品牌</label><select value={counterReportFilter.brand} onChange={e => setCounterReportFilter({...counterReportFilter, brand: e.target.value})} className="w-full border border-slate-300 p-2 rounded text-sm bg-white outline-none"><option value="">選擇品牌</option>{COUNTER_BRANDS.map(b => <option key={b} value={b}>{b}</option>)}</select></div>
                 </div>
                 {!counterReportFilter.brand ? (
                    <div className="text-center py-20 text-slate-400 font-bold bg-slate-50 rounded-2xl shadow-sm border border-slate-200">👆 請選擇品牌以查看該品牌各店獎金</div>
                 ) : (
                   <div id="report-panel" className="bg-slate-50 rounded-2xl shadow-md border border-slate-200 mb-6 print-panel overflow-hidden">
                      <div className="bg-teal-700 p-6 text-white text-center">
                         <h2 className="text-2xl font-bold tracking-widest mb-2">櫃台客服獎金結算報表</h2>
                         <p className="text-teal-100 font-medium">{counterReportFilter.brand} - {counterReportFilter.month}</p>
                      </div>
                      <div className="p-6 overflow-x-auto">
                        <table className="w-full text-left border-collapse whitespace-nowrap">
                          <thead>
                            <tr className="bg-slate-100 text-slate-600 text-sm">
                              <th className="p-3 border-b border-slate-200 font-bold">分院</th>
                              <th className="p-3 border-b border-slate-200 font-bold">姓名</th>
                              <th className="p-3 border-b border-slate-200 font-bold">職稱</th>
                              <th className="p-3 border-b border-slate-200 text-center font-bold">進度狀態</th>
                              <th className="p-3 border-b border-slate-200 text-center font-bold text-slate-500">評核人1</th>
                              <th className="p-3 border-b border-slate-200 text-center font-bold text-teal-700">評分1</th>
                              <th className="p-3 border-b border-slate-200 text-center font-bold text-slate-500">評核人2</th>
                              <th className="p-3 border-b border-slate-200 text-center font-bold text-teal-700">評分2</th>
                              <th className="p-3 border-b border-slate-200 text-center font-bold text-slate-500">評核人3</th>
                              <th className="p-3 border-b border-slate-200 text-center font-bold text-teal-700">評分3</th>
                              <th className="p-3 border-b border-slate-200 text-center font-bold text-sky-700">最終平均</th>
                              <th className="p-3 border-b border-slate-200 text-right font-bold text-orange-600">達成獎金</th>
                            </tr>
                          </thead>
                          <tbody>
                            {(() => {
                              const rows = [];
                              const brand = counterReportFilter.brand;
                              COUNTER_BRANCHES[brand].forEach(branch => {
                                if (!rosters.counter[brand] || !rosters.counter[brand][branch]) return;
                                let branchSum = 0; let branchCount = 0;
                                const evaluators = rosters.counter[brand][branch].evaluators.filter(e=>e.active);
                                const expectedCount = evaluators.length;
                                const evaluatees = rosters.counter[brand][branch].evaluatees.filter(e=>e.active);
                                const dirInfo = rosters.counter[brand][branch].director;
                                const hasDir = dirInfo && dirInfo.active && dirInfo.name;
                                const rowSpanCount = evaluatees.length + (hasDir ? 1 : 0);

                                if (rowSpanCount === 0) return;

                                evaluatees.forEach((staffObj, sIdx) => {
                                  const staff = staffObj.name;
                                  const rec = counterRecords[counterReportFilter.month]?.[brand]?.[branch]?.[staff];
                                  const summary = getCounterStaffSummary(rec, expectedCount);
                                  if (summary.isComplete) { branchSum += summary.avgScore; branchCount++; }
                                  
                                  const ev1 = evaluators[0]; const ev1Data = ev1 ? rec?.evaluations?.[ev1.name] : null; const s1 = (ev1Data && ev1Data.isComplete) ? (Object.values(ev1Data.scores).reduce((a,b)=>a+b,0)/5) : '-';
                                  const ev2 = evaluators[1]; const ev2Data = ev2 ? rec?.evaluations?.[ev2.name] : null; const s2 = (ev2Data && ev2Data.isComplete) ? (Object.values(ev2Data.scores).reduce((a,b)=>a+b,0)/5) : '-';
                                  const ev3 = evaluators[2]; const ev3Data = ev3 ? rec?.evaluations?.[ev3.name] : null; const s3 = (ev3Data && ev3Data.isComplete) ? (Object.values(ev3Data.scores).reduce((a,b)=>a+b,0)/5) : '-';

                                  rows.push(
                                    <tr key={`${brand}-${branch}-${staff}`} className="border-b border-slate-100 hover:bg-white transition-colors">
                                      {sIdx === 0 && <td rowSpan={rowSpanCount} className="p-3 text-slate-700 border-r border-slate-200 font-bold align-top bg-slate-50">{branch}</td>}
                                      <td className="p-3 text-slate-800 font-medium">{staff}</td>
                                      <td className="p-3 text-slate-500 text-sm">客服櫃台</td>
                                      <td className="p-3 text-center">
                                        {summary.isComplete ? <span className="bg-teal-100 text-teal-700 px-3 py-1 rounded-full text-xs font-bold shadow-sm">已完成</span> : <span className="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-xs font-bold shadow-sm">{summary.evalCount > 0 ? `${summary.evalCount}/${expectedCount}人已評` : '未完成'}</span>}
                                      </td>
                                      <td className="p-3 text-center text-sm text-slate-600 bg-slate-100/50 border-l border-slate-100">{ev1 ? ev1.name : '-'}</td>
                                      <td className="p-3 text-center text-sm font-bold text-teal-700 bg-slate-100/50">{s1}</td>
                                      <td className="p-3 text-center text-sm text-slate-600 border-l border-slate-100">{ev2 ? ev2.name : '-'}</td>
                                      <td className="p-3 text-center text-sm font-bold text-teal-700">{s2}</td>
                                      <td className="p-3 text-center text-sm text-slate-600 bg-slate-100/50 border-l border-slate-100">{ev3 ? ev3.name : '-'}</td>
                                      <td className="p-3 text-center text-sm font-bold text-teal-700 bg-slate-100/50">{s3}</td>
                                      <td className="p-3 text-center font-bold text-sky-700 text-lg border-l border-slate-200">{summary.evalCount > 0 ? summary.avgScore : '-'}</td>
                                      <td className="p-3 text-right font-bold text-orange-600 border-l border-slate-100">{summary.isComplete ? `$${summary.bonus}` : '-'}</td>
                                    </tr>
                                  );
                                });

                                if (hasDir) {
                                   const dirAvg = branchCount > 0 ? parseFloat((branchSum/branchCount).toFixed(1)) : 0;
                                   rows.push(
                                     <tr key={`${brand}-${branch}-dir`} className="border-b-2 border-slate-300 bg-indigo-50/40">
                                       {evaluatees.length === 0 && <td rowSpan={1} className="p-3 text-slate-700 border-r border-slate-200 font-bold align-top bg-slate-50">{branch}</td>}
                                       <td className="p-3 font-bold text-indigo-900">{dirInfo.name}</td>
                                       <td className="p-3 font-bold text-indigo-700 text-sm">該店主任</td>
                                       <td className="p-3 text-center">{branchCount > 0 ? <span className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold shadow-sm">已結算</span> : <span className="text-slate-400 text-xs font-bold">待結算</span>}</td>
                                       <td colSpan="6" className="p-3 text-center text-slate-500 text-xs tracking-widest font-bold border-l border-slate-200">── 此為該店所有櫃台平均，不作單獨評分 ──</td>
                                       <td className="p-3 text-center font-bold text-sky-800 text-lg border-l border-slate-200">{branchCount > 0 ? dirAvg : '-'}</td>
                                       <td className="p-3 text-right font-bold text-orange-700 text-lg border-l border-slate-200">{branchCount > 0 ? '$' + calculateDirectorBonus(dirAvg) : '-'}</td>
                                     </tr>
                                   );
                                }
                              });
                              return rows;
                            })()}
                          </tbody>
                        </table>
                      </div>
                   </div>
                 )}
              </div>
            );
          }
        };

        const renderRosterManager = () => {
          const toggleNursingActive = (branch, idx) => {
            setRosters(prev => { const n = JSON.parse(JSON.stringify(prev)); n.nursing[branch][idx].active = !n.nursing[branch][idx].active; return n; });
          };
          const addNursing = (branch) => {
            const el = document.getElementById(`add-nursing-${branch}`);
            if (el && el.value.trim()) {
               setRosters(prev => { const n = JSON.parse(JSON.stringify(prev)); n.nursing[branch].push({name: el.value.trim(), active: true}); return n; });
               el.value = '';
            }
          };
          const deleteNursing = (branch, idx) => {
            const targetName = rosters.nursing[branch][idx].name;
            setSysModal({
              show: true, msg: `確定要永久刪除護理師「${targetName}」嗎？\n\n⚠️ 建議：若該員已有歷史評核紀錄，請改用取消勾選「啟用」將其隱藏即可，以免影響過往報表。`, type: 'confirm', alignLeft: true,
              onConfirm: () => setRosters(prev => { const n = JSON.parse(JSON.stringify(prev)); n.nursing[branch].splice(idx, 1); return n; })
            });
          };

          const toggleCounterDirActive = (brand, branch) => {
            setRosters(prev => { const n = JSON.parse(JSON.stringify(prev)); n.counter[brand][branch].director.active = !n.counter[brand][branch].director.active; return n; });
          };
          const updateCounterDirName = (brand, branch, val) => {
            setRosters(prev => { const n = JSON.parse(JSON.stringify(prev)); n.counter[brand][branch].director.name = val; return n; });
          };

          const toggleCounterEvalActive = (brand, branch, idx) => {
            setRosters(prev => { const n = JSON.parse(JSON.stringify(prev)); n.counter[brand][branch].evaluators[idx].active = !n.counter[brand][branch].evaluators[idx].active; return n; });
          };
          const updateCounterEvalTitle = (brand, branch, idx, val) => {
            setRosters(prev => { const n = JSON.parse(JSON.stringify(prev)); n.counter[brand][branch].evaluators[idx].title = val; return n; });
          };
          const updateCounterEvalName = (brand, branch, idx, val) => {
            setRosters(prev => { const n = JSON.parse(JSON.stringify(prev)); n.counter[brand][branch].evaluators[idx].name = val; return n; });
          };
          const addCounterEval = (brand, branch) => {
            setRosters(prev => { const n = JSON.parse(JSON.stringify(prev)); n.counter[brand][branch].evaluators.push({title: '店經理', name: '新評核人', active: true}); return n; });
          };
          const deleteCounterEval = (brand, branch, idx) => {
            const targetName = rosters.counter[brand][branch].evaluators[idx].name;
            setSysModal({
              show: true, msg: `確定要永久刪除評核人「${targetName}」嗎？\n\n⚠️ 建議：若該主管已有歷史紀錄，取消勾選「啟用」將其隱藏即可。`, type: 'confirm', alignLeft: true,
              onConfirm: () => setRosters(prev => { const n = JSON.parse(JSON.stringify(prev)); n.counter[brand][branch].evaluators.splice(idx, 1); return n; })
            });
          };

          const toggleCounterEmpActive = (brand, branch, idx) => {
            setRosters(prev => { const n = JSON.parse(JSON.stringify(prev)); n.counter[brand][branch].evaluatees[idx].active = !n.counter[brand][branch].evaluatees[idx].active; return n; });
          };
          const updateCounterEmpName = (brand, branch, idx, val) => {
            setRosters(prev => { const n = JSON.parse(JSON.stringify(prev)); n.counter[brand][branch].evaluatees[idx].name = val; return n; });
          };
          const addCounterEmp = (brand, branch) => {
            setRosters(prev => { const n = JSON.parse(JSON.stringify(prev)); n.counter[brand][branch].evaluatees.push({name: '新受評者', active: true}); return n; });
          };
          const deleteCounterEmp = (brand, branch, idx) => {
            const targetName = rosters.counter[brand][branch].evaluatees[idx].name;
            setSysModal({
              show: true, msg: `確定要永久刪除受評者「${targetName}」嗎？\n\n⚠️ 建議：若該員已離職但有歷史紀錄，取消勾選「啟用」將其隱藏即可。`, type: 'confirm', alignLeft: true,
              onConfirm: () => setRosters(prev => { const n = JSON.parse(JSON.stringify(prev)); n.counter[brand][branch].evaluatees.splice(idx, 1); return n; })
            });
          };

          return (
            <div className="max-w-4xl mx-auto bg-slate-100 min-h-screen pb-20">
               <div className="bg-slate-800 text-white p-4 sticky top-0 z-20 shadow-md flex justify-between items-center">
                 <button onClick={() => setCurrentView('settings')} className="text-sm bg-white/20 px-3 py-1 rounded-lg hover:bg-white/30 transition">返回設定</button>
                 <h2 className="font-bold text-lg tracking-wider">人員名單管理</h2>
                 <button onClick={saveRostersToCloud} className="text-sm bg-sky-600 hover:bg-sky-500 px-3 py-1 rounded-lg font-bold shadow-sm transition">💾 儲存變更</button>
               </div>

               <div className="p-4 flex gap-2">
                 <button onClick={()=>setRosterTab('nursing')} className={`flex-1 py-3 font-bold rounded-xl transition ${rosterTab==='nursing'?'bg-sky-700 text-white shadow-md':'bg-slate-200 text-slate-500 hover:bg-slate-300'}`}>護理部名單</button>
                 <button onClick={()=>setRosterTab('counter')} className={`flex-1 py-3 font-bold rounded-xl transition ${rosterTab==='counter'?'bg-teal-700 text-white shadow-md':'bg-slate-200 text-slate-500 hover:bg-slate-300'}`}>櫃台部名單</button>
               </div>

               <div className="p-4 space-y-6">
                 {rosterTab === 'nursing' && NURSING_BRANCHES.map(branch => {
                   if (!rosters.nursing[branch]) return null;
                   return (
                   <div key={branch} className="bg-slate-50 p-5 rounded-2xl shadow-sm border border-sky-100">
                     <h4 className="font-bold text-xl text-sky-800 mb-4 border-b border-sky-100 pb-2">{branch}</h4>
                     {rosters.nursing[branch].map((n, idx) => (
                        <div key={idx} className={`flex items-center gap-3 mb-2 p-2 rounded-lg transition-colors ${n.active ? 'bg-white hover:bg-slate-50 border border-slate-100' : 'bg-red-50/50 opacity-70 border border-red-100'}`}>
                           <label className="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" checked={n.active} onChange={() => toggleNursingActive(branch, idx)} className="w-4 h-4 cursor-pointer"/> 啟用</label>
                           <span className={`font-bold flex-1 ${n.active ? 'text-slate-800' : 'text-slate-400 line-through'}`}>{n.name}</span>
                           <button onClick={() => deleteNursing(branch, idx)} className="text-red-500 hover:text-white hover:bg-red-500 px-2 py-1 bg-white rounded shadow-sm border border-red-200 text-xs font-bold transition-colors" title="永久刪除">🗑️ 刪除</button>
                        </div>
                     ))}
                     <div className="flex gap-2 mt-4 pt-4 border-t border-dashed border-slate-200">
                        <input id={`add-nursing-${branch}`} type="text" placeholder="新護理師名稱..." className="border border-slate-300 p-2.5 rounded-lg text-sm flex-1 bg-white outline-none focus:border-sky-400 transition-colors" />
                        <button onClick={() => addNursing(branch)} className="bg-sky-100 hover:bg-sky-200 text-sky-700 px-5 rounded-lg font-bold text-sm shadow-sm transition-colors">新增人員</button>
                     </div>
                   </div>
                   );
                 })}

                 {rosterTab === 'counter' && COUNTER_BRANDS.map(brand => (
                    <div key={brand} className="space-y-4">
                       <h3 className="font-black text-2xl text-teal-800 mt-6 border-b-2 border-teal-200 pb-2">{brand}</h3>
                       {COUNTER_BRANCHES[brand].map(branch => {
                         if (!rosters.counter[brand][branch]) return null;
                         return (
                         <div key={branch} className="bg-slate-50 p-5 rounded-2xl shadow-sm border border-teal-100">
                           <h4 className="font-bold text-white bg-teal-600 p-2.5 rounded-lg mb-4 text-center tracking-widest shadow-sm">{branch}</h4>
                           
                           <div className="mb-6 bg-orange-50/80 p-4 rounded-xl border border-orange-200">
                             <span className="text-sm font-bold text-orange-800 block mb-3 flex items-center gap-1">🏆 該店主任 <span className="font-normal text-orange-600 text-xs">(作為整店平均獎金對象)</span></span>
                             <div className="flex items-center gap-3 bg-white p-2 rounded-lg border border-orange-200 shadow-sm">
                                <label className="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" checked={rosters.counter[brand][branch].director.active} onChange={() => toggleCounterDirActive(brand, branch)} className="w-4 h-4 cursor-pointer"/> 啟用</label>
                                <input type="text" value={rosters.counter[brand][branch].director.name} onChange={e => updateCounterDirName(brand, branch, e.target.value)} className="border-none p-1 text-sm flex-1 font-bold text-slate-800 outline-none" placeholder="無主任請留空"/>
                             </div>
                           </div>

                           <div className="mb-6">
                             <span className="text-sm font-bold text-slate-600 block mb-3">📋 評核人名單 (主管)</span>
                             {rosters.counter[brand][branch].evaluators.map((ev, idx) => (
                                <div key={idx} className={`flex items-center gap-2 mb-2 p-2 rounded-lg transition-colors border ${ev.active ? 'bg-white border-slate-100 hover:bg-slate-50' : 'bg-red-50/50 opacity-70 border-red-100'}`}>
                                   <input type="checkbox" checked={ev.active} onChange={() => toggleCounterEvalActive(brand, branch, idx)} className="w-4 h-4 cursor-pointer"/>
                                   <select value={ev.title} onChange={e => updateCounterEvalTitle(brand, branch, idx, e.target.value)} className="border border-slate-200 p-2 rounded text-sm w-28 outline-none focus:border-teal-400 bg-slate-50 font-bold text-slate-600">
                                      {['店經理', '店副理', '護理長', '行政主任', '客服主任', '主管'].map(t=><option key={t}>{t}</option>)}
                                   </select>
                                   <input type="text" value={ev.name} onChange={e => updateCounterEvalName(brand, branch, idx, e.target.value)} className="border border-slate-200 p-2 rounded text-sm flex-1 outline-none focus:border-teal-400 bg-slate-50 font-bold text-slate-800"/>
                                   <button onClick={() => deleteCounterEval(brand, branch, idx)} className="text-red-500 hover:text-white hover:bg-red-500 px-2 py-1.5 bg-white rounded shadow-sm border border-red-200 text-xs font-bold transition-colors" title="永久刪除">🗑️</button>
                                </div>
                             ))}
                             <button onClick={() => addCounterEval(brand, branch)} className="text-xs bg-teal-50 text-teal-800 font-bold px-4 py-2 mt-2 rounded-lg border border-teal-200 hover:bg-teal-100 transition-colors shadow-sm">+ 新增評核人</button>
                           </div>

                           <div>
                             <span className="text-sm font-bold text-slate-600 block mb-3">💁‍♀️ 受評者名單 (櫃台)</span>
                             {rosters.counter[brand][branch].evaluatees.map((emp, idx) => (
                                <div key={idx} className={`flex items-center gap-3 mb-2 p-2 rounded-lg transition-colors border ${emp.active ? 'bg-white border-slate-100 hover:bg-slate-50' : 'bg-red-50/50 opacity-70 border-red-100'}`}>
                                   <input type="checkbox" checked={emp.active} onChange={() => toggleCounterEmpActive(brand, branch, idx)} className="w-4 h-4 cursor-pointer"/>
                                   <input type="text" value={emp.name} onChange={e => updateCounterEmpName(brand, branch, idx, e.target.value)} className="border border-slate-200 p-2 rounded text-sm flex-1 outline-none focus:border-teal-400 bg-slate-50 font-bold text-slate-800"/>
                                   <button onClick={() => deleteCounterEmp(brand, branch, idx)} className="text-red-500 hover:text-white hover:bg-red-500 px-2 py-1.5 bg-white rounded shadow-sm border border-red-200 text-xs font-bold transition-colors" title="永久刪除">🗑️</button>
                                </div>
                             ))}
                             <button onClick={() => addCounterEmp(brand, branch)} className="text-xs bg-teal-50 text-teal-800 font-bold px-4 py-2 mt-2 rounded-lg border border-teal-200 hover:bg-teal-100 transition-colors shadow-sm">+ 新增受評者</button>
                           </div>
                         </div>
                         );
                       })}
                    </div>
                 ))}
               </div>
            </div>
          );
        };

        const renderSettings = () => (
          <div className="max-w-xl mx-auto bg-slate-100 min-h-screen p-6 pb-20">
             <div className="flex justify-between items-center mb-6">
                <button onClick={() => setCurrentView('home')} className="flex items-center text-slate-500 hover:text-slate-800 font-bold transition-colors">
                  <svg className="w-5 h-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" /></svg> 返回首頁
                </button>
             </div>
             
             <div className="mb-6">
                <button onClick={() => setCurrentView('roster_manager')} className="w-full py-4 rounded-2xl font-bold text-lg bg-sky-700 text-white shadow-lg hover:bg-sky-800 transition flex justify-center items-center gap-2">
                  👥 進入人員名單動態管理
                </button>
                <p className="text-xs text-slate-500 text-center mt-2 font-medium">包含護理師、櫃台客服及主管名單維護</p>
             </div>

             <div className="bg-slate-50 rounded-2xl shadow-md overflow-hidden border border-slate-200 mb-6 animate-fade-in">
                <div className="bg-slate-800 p-6 text-white text-center"><h2 className="text-2xl font-bold tracking-widest">系統權限與密碼設定</h2></div>
                <div className="p-6 space-y-5">
                  <div><label className="text-sm font-bold text-slate-600 block mb-2">👑 總管理密碼</label><input type="text" value={editingPasswords.superadmin} onChange={(e) => setEditingPasswords({...editingPasswords, superadmin: e.target.value})} className="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-slate-800 outline-none transition-shadow bg-white" /></div>
                  <div><label className="text-sm font-bold text-slate-600 block mb-2">👩‍💼 人資密碼 (僅供檢視、匯出用)</label><input type="text" value={editingPasswords.hr} onChange={(e) => setEditingPasswords({...editingPasswords, hr: e.target.value})} className="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none transition-shadow bg-white" /></div>
                  <hr className="border-slate-200"/>
                  <div><label className="text-sm font-bold text-slate-600 block mb-2">👩‍⚕️ 主管密碼 (服務品質評核用)</label><input type="text" value={editingPasswords.manager} onChange={(e) => setEditingPasswords({...editingPasswords, manager: e.target.value})} className="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none transition-shadow bg-white" /></div>
                  <div><label className="text-sm font-bold text-slate-600 block mb-2">🏢 店經理密碼 (服務品質核決用)</label><input type="text" value={editingPasswords.storeManager} onChange={(e) => setEditingPasswords({...editingPasswords, storeManager: e.target.value})} className="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-sky-500 outline-none transition-shadow bg-white" /></div>
                  <hr className="border-slate-200"/>
                  <div><label className="text-sm font-bold text-slate-600 block mb-2">🛡️ 護理長密碼 (醫療安全評核解鎖用)</label><input type="text" value={editingPasswords.safetyUnlock} onChange={(e) => setEditingPasswords({...editingPasswords, safetyUnlock: e.target.value})} className="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none transition-shadow bg-white" /></div>
                </div>
                <div className="p-4 bg-slate-100 border-t border-slate-200"><button onClick={handleSavePasswords} className="w-full py-3.5 rounded-xl font-bold bg-slate-800 text-white shadow hover:bg-slate-900 transition">💾 儲存並更新密碼設定</button></div>
             </div>
          </div>
        );

        return (
          <div className="min-h-screen relative font-sans text-slate-800">
            {/* 總管/人資登入按鈕 */}
            {(sysModule === 'portal' || currentView === 'home') && (
              <div className="fixed top-4 right-4 z-50 no-print animate-fade-in">
                <button onClick={handleAdminToggle} className={`px-4 py-2 rounded-full text-xs font-bold shadow-md border transition-colors backdrop-blur-md ${isSuperAdmin ? 'bg-red-600/90 text-white border-red-700' : isHrLoggedIn ? 'bg-purple-600/90 text-white border-purple-700' : 'bg-white/80 text-slate-600 border-slate-300 hover:bg-white'}`}>
                  {isSuperAdmin ? '👑 總管已登入' : isHrLoggedIn ? '👩‍💼 人資已登入' : '🔐 管理登入'}
                </button>
              </div>
            )}
            
            {/* 💡 核心路由渲染 */}
            {currentView === 'settings' && isSuperAdmin ? renderSettings() :
             currentView === 'roster_manager' && isSuperAdmin ? renderRosterManager() :
             sysModule === 'portal' ? renderPortal() : (
              <React.Fragment>
                {currentView === 'home' && renderHome()}
                {currentView === 'service' && renderServiceQuality()}
                {currentView === 'safety' && renderMedicalSafety()}
                {currentView === 'counter_form' && renderCounterForm()}
                {currentView === 'dashboard' && renderDashboard()}
                {currentView === 'report' && renderReport()}
              </React.Fragment>
            )}

            {showPasswordModal && (
              <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl animate-fade-in">
                  <h3 className="text-xl font-bold text-slate-800 mb-2">需要授權</h3>
                  <p className="text-slate-500 text-sm mb-4">
                    {pendingRole === 'safetyUnlock' ? '切換至編輯模式需要輸入護理長密碼。' : 
                     pendingRole === 'admin_login' ? '請輸入總管理者或人資專用密碼。' : 
                     pendingRole === 'counter_report' || pendingRole === 'counter_report_dash' ? '為確保多對一評分期間的公正性，櫃台獎金報表僅限「總管密碼」解鎖查看。' : 
                     `切換至「${pendingRole === 'manager' ? '主管評核' : '店經理核決'}」需要密碼。`}
                  </p>
                  <input type="password" placeholder="請輸入密碼" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && confirmPassword()} className="w-full p-3 rounded-lg border border-slate-300 focus:border-sky-500 focus:ring-1 focus:ring-sky-500 outline-none mb-5 transition-shadow" />
                  <div className="flex gap-3"><button onClick={() => {setShowPasswordModal(false); setPasswordInput('');}} className="flex-1 py-3 rounded-xl font-bold bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors">取消</button><button onClick={confirmPassword} className="flex-1 py-3 rounded-xl font-bold bg-sky-600 text-white hover:bg-sky-700 transition-colors shadow-sm">確認</button></div>
                </div>
              </div>
            )}

            {sysModal.show && (
              <div className="fixed inset-0 bg-slate-900/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl animate-fade-in text-center flex flex-col max-h-[90vh]">
                  <div className="mb-4 shrink-0 text-4xl">{sysModal.type === 'alert' ? 'ℹ️' : '⚠️'}</div>
                  <h3 className="text-lg font-bold text-slate-800 mb-2 shrink-0">{sysModal.type === 'alert' ? '系統提示' : '請確認'}</h3>
                  <div className={`text-slate-600 text-sm mb-6 whitespace-pre-line bg-slate-50 p-4 rounded-xl border border-slate-100 overflow-y-auto ${sysModal.alignLeft ? 'text-left' : 'text-center'}`}>{sysModal.msg}</div>
                  <div className="flex gap-3 justify-center shrink-0">
                    {sysModal.type === 'confirm' && <button onClick={() => setSysModal({show: false})} className="flex-1 py-3 rounded-xl font-bold bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors">取消</button>}
                    <button onClick={() => { if (sysModal.onConfirm) sysModal.onConfirm(); setSysModal({show: false}); }} className={`flex-1 py-3 rounded-xl font-bold text-white shadow-sm transition-colors ${sysModal.type === 'confirm' ? 'bg-red-500 hover:bg-red-600' : 'bg-sky-600 hover:bg-sky-700'}`}>確定</button>
                  </div>
                </div>
              </div>
            )}

            {showSopModal && (
              <div className="fixed inset-0 bg-slate-900/60 z-[70] flex items-center justify-center p-4 backdrop-blur-sm no-print">
                <div className="bg-slate-50 rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden flex flex-col max-h-[85vh] animate-fade-in border border-slate-200">
                  <div className="bg-teal-700 p-4 text-white flex justify-between items-center sticky top-0">
                     <h3 className="font-bold text-lg tracking-wider">醫療安全 SOP</h3>
                     <button onClick={() => setShowSopModal(false)} className="text-teal-100 hover:text-white bg-teal-800/50 rounded-full p-1 transition-colors">
                       <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                     </button>
                  </div>
                  <div className="p-6 overflow-y-auto space-y-5 bg-slate-100">
                     {MEDICAL_SOP.map((sop, idx) => (
                       <div key={idx} className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                         <h4 className="font-bold text-teal-800 mb-2 border-b border-slate-100 pb-2">{sop.title}</h4>
                         <p className="text-sm text-slate-600 whitespace-pre-line leading-relaxed">{sop.content}</p>
                       </div>
                     ))}
                  </div>
                  <div className="p-4 border-t border-slate-200 bg-white shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-10">
                     <button onClick={() => setShowSopModal(false)} className="w-full py-3 rounded-xl font-bold bg-teal-600 text-white hover:bg-teal-700 transition-colors shadow-sm">了解並關閉</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    };

    if (window.FirebaseAPI) { initApp(); } else { window.addEventListener('firebaseLoaded', initApp); }
  </script>
</body>
</html>
