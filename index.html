<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- Icons ---
        const Icon = ({ icon, size = 18, className = "" }) => {
            const [svgHtml, setSvgHtml] = useState("");
            useEffect(() => {
                if (window.lucide && window.lucide.icons && window.lucide.icons[icon]) {
                    try {
                        const iconNode = window.lucide.icons[icon];
                        if (typeof iconNode.toSVG === 'function') {
                            setSvgHtml(iconNode.toSVG({ width: size, height: size, class: className }));
                        }
                    } catch (e) {}
                }
            }, [icon, size, className]);
            if (!svgHtml) return <span className={`inline-block w-[${size}px] h-[${size}px]`}></span>;
            return <span dangerouslySetInnerHTML={{ __html: svgHtml }} className="flex items-center justify-center" />;
        };

        // --- Constants ---
        const SENIORITY_RANGES = [
            { id: '0-1', label: '1年以下 (新人)', min: 0, max: 1 },
            { id: '1-2', label: '1-2年', min: 1, max: 2 },
            { id: '2-3', label: '2-3年', min: 2, max: 3 },
            { id: '3-5', label: '3-5年', min: 3, max: 5 },
            { id: '5-10', label: '5-10年', min: 5, max: 10 },
            { id: '10+', label: '10年以上', min: 10, max: 999 }
        ];

        const METRIC_MAP = {
            "營收月目標": "monthlyGoal", "營收月達成": "monthlyAchieved", "營收達成率": "achievedRate",
            "當月開卡業績": "cardSales", "當月開卡比率": "cardRate",
            "到店來客數": "totalVisits", "到店消費人數": "payingCustomers", "平均成交率": "dealRate", "總平均客單": "avgTicket",
            "到店新客數": "newVisits", "新客成交數": "newDeals", "新客成交率": "newDealRate", "新客消費金額": "newAmount", "新客平均客單": "newAvgTicket",
            "到店舊客數": "oldVisits", "舊客成交數": "oldDeals", "舊客成交率": "oldDealRate", "舊客消費金額": "oldAmount", "舊客平均客單": "oldAvgTicket",
            "當月消耗金額": "consumeAmount", "當月消耗人數": "consumePeople", "當月平均消耗": "consumeAvg",
            "總銷售業績": "totalSales", "當月銷售業績": "monthlySales", "保養/保健品銷售業績": "productSales"
        };

        const RANK_METRICS = [
            'cardRate', 'dealRate', 'avgTicket', 'newDealRate', 'newAvgTicket', 'oldDealRate', 'oldAvgTicket'
        ];

        // --- Helpers ---
        const cleanNumber = (val) => {
            if (typeof val === 'number') return val;
            if (!val) return 0;
            if (typeof val === 'string') {
                let clean = val.replace(/,/g, '').trim();
                if (clean.includes('%')) return parseFloat(clean.replace('%', '')) * 100;
                return parseFloat(clean);
            }
            return 0;
        };

        const formatMoney = (num) => {
            if (num === undefined || num === null || isNaN(num)) return '-';
            return new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(num);
        };

        const formatPercent = (num) => {
             if (num === undefined || num === null || isNaN(num)) return '-';
             return parseFloat(num).toFixed(1).replace(/\.0$/, '') + '%';
        }

        // --- SENIORITY CALCULATION ---
        const calculateSeniorityInfo = (val) => {
            if (!val) return { text: "未知", years: 0 };
            const today = new Date('2026-02-11');
            let date;

            const strVal = String(val).trim();
            const dateMatch = strVal.match(/(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})/);

            if (dateMatch) {
                const year = parseInt(dateMatch[1], 10);
                const month = parseInt(dateMatch[2], 10) - 1; 
                const day = parseInt(dateMatch[3], 10);
                date = new Date(year, month, day);
            } 
            else if (!isNaN(parseFloat(val)) && isFinite(val)) {
                if (parseFloat(val) > 20000) {
                     const serial = parseFloat(val);
                     date = new Date(Math.round((serial - 25569) * 86400 * 1000));
                }
            } else {
                date = new Date(strVal);
            }

            if (!date || isNaN(date.getTime())) return { text: "未知", years: 0 };

            let months = (today.getFullYear() - date.getFullYear()) * 12 + (today.getMonth() - date.getMonth());
            if (today.getDate() < date.getDate()) {
                months--;
            }
            
            if (months < 0) return { text: "未到職", years: 0 };
            
            const y = Math.floor(months / 12);
            const m = months % 12;
            const text = y > 0 ? (m > 0 ? `${y}年${m}個月` : `${y}年`) : `${m}個月`;
            
            return { text: text, years: months / 12 };
        };

        // --- RANKING LOGIC ---
        const calculateRankings = (items, bottomThreshold = 3) => {
            if (!items || items.length === 0) return items;
            const rankedItems = items.map(item => ({ ...item, ranks: {} }));
            const count = rankedItems.length;

            RANK_METRICS.forEach(metric => {
                const sorted = [...rankedItems].sort((a, b) => (b.stats[metric] || 0) - (a.stats[metric] || 0));
                
                sorted.forEach((item, index) => {
                    const originalItem = rankedItems.find(ri => {
                        if (ri.name && item.name) {
                            return ri.name === item.name && ri.branch === item.branch;
                        }
                        return ri.branchName && ri.branchName === item.branchName;
                    });
                    
                    if (!originalItem) return;

                    if (index === 0) originalItem.ranks[metric] = 'top1';
                    else if (index === 1) originalItem.ranks[metric] = 'top2';
                    else if (index === 2) originalItem.ranks[metric] = 'top3';
                    
                    if (bottomThreshold > 0 && index >= count - bottomThreshold) {
                        if (!originalItem.ranks[metric]) {
                            originalItem.ranks[metric] = 'bottom';
                        }
                    }
                });
            });
            return rankedItems;
        };

        const calculateGlobalSalesRanks = (allBranchData) => {
            let allStaff = [];
            allBranchData.forEach(branch => {
                if (branch.staff) {
                    branch.staff.forEach(s => {
                        const sales = s.stats.totalSales || s.stats.monthlySales || 0;
                        allStaff.push({
                            ...s,
                            rawSales: sales,
                            branchName: branch.branchName 
                        });
                    });
                }
            });

            allStaff.sort((a, b) => b.rawSales - a.rawSales);

            const top10Map = {};
            allStaff.forEach((s, index) => {
                const key = `${s.name}_${s.branchName}`;
                top10Map[key] = index + 1;
            });

            return top10Map;
        };

        // --- MOCK DATA GENERATOR ---
        const generateMockData = () => {
            const branches = ["台北旗艦店", "台中向上店", "高雄巨蛋店"];
            const roles = ["店長", "諮詢主任", "諮詢師", "醫美師"];
            const r = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
            
            const staffList = [];
            let globalId = 1;
            
            branches.forEach(b => {
                for(let i=0; i<8; i++) {
                    const joinYear = 2026 - r(0, 10);
                    const senInfo = calculateSeniorityInfo(`${joinYear}/${r(1,12)}/01`);
                    staffList.push({
                        name: `模擬人員${globalId++}`,
                        role: roles[i % roles.length],
                        branch: b,
                        seniority: senInfo.text,
                        seniorityYears: senInfo.years,
                        stats: {
                            totalSales: r(500000, 5000000), monthlySales: r(100000, 1000000), productSales: r(10000, 200000),
                            cardSales: r(50000, 500000), cardRate: r(10, 80), totalVisits: r(50, 200), payingCustomers: r(40, 180),
                            dealRate: r(30, 90), avgTicket: r(3000, 20000), newVisits: r(10, 50), newDeals: r(5, 40),
                            newDealRate: r(20, 80), newAmount: r(50000, 500000), newAvgTicket: r(5000, 30000),
                            oldVisits: r(40, 150), oldDeals: r(35, 140), oldDealRate: r(50, 95), oldAmount: r(100000, 1000000),
                            oldAvgTicket: r(2000, 15000), consumeAmount: r(200000, 2000000), consumePeople: r(50, 200), consumeAvg: r(2000, 10000)
                        },
                        ranks: {}
                    });
                }
            });

            const branchData = { branches: {}, branchOrder: branches };
            const demoPeriods = ["1月", "2月", "3月", "第一季", "年度"];
            
            branches.forEach(b => {
                branchData.branches[b] = {};
                demoPeriods.forEach(p => {
                    let mult = p.includes('季') ? 3 : (p.includes('年度') ? 12 : 1);
                    branchData.branches[b][p] = {
                        monthlyGoal: 10000000 * mult,
                        monthlyAchieved: r(8000000, 15000000) * mult,
                        cardSales: r(1000000, 5000000) * mult, cardRate: r(20, 60),
                        totalVisits: r(500, 1000) * mult, payingCustomers: r(400, 900) * mult,
                        dealRate: r(40, 80), avgTicket: r(5000, 25000),
                        newVisits: r(100, 300) * mult, newDeals: r(50, 200) * mult,
                        newDealRate: r(30, 70), newAmount: r(1000000, 3000000) * mult, newAvgTicket: r(8000, 30000),
                        oldVisits: r(400, 800) * mult, oldDeals: r(350, 750) * mult,
                        oldDealRate: r(60, 95), oldAmount: r(5000000, 10000000) * mult, oldAvgTicket: r(4000, 20000),
                        consumeAmount: r(4000000, 8000000) * mult, consumePeople: r(300, 600) * mult, consumeAvg: r(5000, 15000),
                        achievedRate: 0 
                    };
                    const s = branchData.branches[b][p];
                    s.achievedRate = (s.monthlyAchieved / s.monthlyGoal) * 100;
                });
            });

            return { branchData: branchData, staffData: staffList, periods: demoPeriods, lastUpdated: "預設本地模擬資料" };
        };


        // ==========================================
        // 核心修正區：強化 Excel 月份/季度辨識與加總
        // ==========================================
        const parseBranchSheet = (sheet) => {
            const data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null });
            if (!data || data.length < 3) return null;
            
            let headerIdx = -1;
            
            for(let i=0; i<Math.min(data.length, 10); i++) {
                let score = 0;
                const row = data[i] || [];
                row.forEach(cell => {
                    const str = String(cell).trim();
                    if (/^20\d{4}$/.test(str)) score += 2; 
                    if (/^\d+月$/.test(str)) score += 2; 
                    if (str.includes('月目標') || str.includes('營收') || str.includes('當月')) score += 1;
                });
                if (score >= 2) {
                    headerIdx = i;
                    break;
                }
            }
            if(headerIdx === -1) headerIdx = 1; 
            
            const headerRow = data[headerIdx]; 
            const periods = [];
            const periodIndices = {};
            const rawPeriodMap = {}; 
            
            if(headerRow && Array.isArray(headerRow)) {
                headerRow.forEach((cell, idx) => {
                    if (cell !== undefined && cell !== null && cell !== "") {
                        let rawName = String(cell).trim();
                        let pName = rawName;
                        
                        if (typeof cell === 'number' && cell > 30000 && cell < 60000) {
                            const d = new Date(Math.round((cell - 25569) * 86400 * 1000));
                            pName = (d.getMonth() + 1) + "月";
                        } 
                        else if (/^20\d{4}$/.test(pName)) {
                             pName = parseInt(pName.substring(4, 6), 10) + "月";
                        }
                        else if (/^20\d{2}[-/.](0?[1-9]|1[0-2])$/.test(pName)) {
                             const m = pName.match(/^20\d{2}[-/.](0?[1-9]|1[0-2])$/)[1];
                             pName = parseInt(m, 10) + "月";
                        }
                        else if (/^(0?[1-9]|1[0-2])\s*月$/.test(pName)) {
                             const m = pName.match(/^(0?[1-9]|1[0-2])/)[1];
                             pName = parseInt(m, 10) + "月";
                        }
                        else if (/^(0?[1-9]|1[0-2])$/.test(pName)) {
                            pName = parseInt(pName, 10) + "月";
                        }
                        
                        if (pName.includes('第一季') || pName.includes('Q1')) pName = '第一季';
                        if (pName.includes('第二季') || pName.includes('Q2')) pName = '第二季';
                        if (pName.includes('第三季') || pName.includes('Q3')) pName = '第三季';
                        if (pName.includes('第四季') || pName.includes('Q4')) pName = '第四季';
                        if (pName.includes('年度') || pName.includes('全年')) pName = '年度';

                        const isStandardPeriod = /^\d+月$/.test(pName) || pName.includes('季') || pName === '年度';

                        if (isStandardPeriod && !periodIndices.hasOwnProperty(pName)) {
                            periods.push(pName);
                            periodIndices[pName] = idx;
                            rawPeriodMap[rawName] = pName;
                        }
                    }
                });
            }
            
            const branches = {};
            const branchOrder = []; 
            let currentBranch = null;
            
            for (let i = headerIdx + 1; i < data.length; i++) {
                const row = data[i];
                if (!row || !row.length) continue;
                
                const colB = row[1]; 
                if (colB !== undefined && colB !== null) {
                    const bName = String(colB).replace(/\r\n/g, '').replace(/\n/g, '').trim();
                    if (bName !== "") {
                        currentBranch = bName;
                        if (!branches[currentBranch]) {
                            branches[currentBranch] = {};
                            branchOrder.push(currentBranch);
                        }
                    }
                }

                const metricName = row[2]; 
                if (currentBranch && metricName && METRIC_MAP[metricName.trim()]) {
                    const key = METRIC_MAP[metricName.trim()];
                    Object.keys(periodIndices).forEach(pName => {
                        const idx = periodIndices[pName];
                        const val = row[idx];
                        if (!branches[currentBranch][pName]) branches[currentBranch][pName] = {};
                        let numVal = cleanNumber(val);
                        if ((key.includes('Rate') || key.includes('比率')) && Math.abs(numVal) <= 10.0 && numVal !== 0) {
                            numVal = numVal * 100;
                        }
                        branches[currentBranch][pName][key] = numVal;
                    });
                }
            }

            let finalPeriods = [...periods];

            Object.keys(branches).forEach(b => {
                const bData = branches[b];
                
                Object.keys(bData).forEach(p => {
                    const stats = bData[p];
                    if (stats.monthlyGoal && stats.monthlyAchieved) stats.achievedRate = (stats.monthlyAchieved / stats.monthlyGoal) * 100;
                });

                const quarters = { 
                    "第一季": ["1月", "2月", "3月"], 
                    "第二季": ["4月", "5月", "6月"],

                    if (availableMonths.length > 0 && !bData[qName]) {
                        if (!finalPeriods.includes(qName)) finalPeriods.push(qName);

                            qStats.cardSales += (s.cardSales || 0); qStats.totalVisits += (s.totalVisits || 0);

                            qStats.consumePeople += (s.consumePeople || 0);

                        qStats.consumeAvg = qStats.consumePeople ? Math.round(qStats.consumeAmount / qStats.consumePeople) : 0;

                        bData[qName] = qStats;
                    }
                });

                const allMonths = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
                const availableAnnualMonths = allMonths.filter(m => periods.includes(m) && bData[m]);
                
                if (availableAnnualMonths.length > 0 && !bData["年度"]) {
                    if (!finalPeriods.includes("年度")) finalPeriods.push("年度");
                    
                    const yStats = { monthlyGoal: 0, monthlyAchieved: 0, cardSales: 0, totalVisits: 0, payingCustomers: 0, newVisits: 0, newDeals: 0, newAmount: 0, oldVisits: 0, oldDeals: 0, oldAmount: 0, consumeAmount: 0, consumePeople: 0 };
                    availableAnnualMonths.forEach(m => {

                        yStats.cardSales += (s.cardSales || 0); yStats.totalVisits += (s.totalVisits || 0);

                        yStats.consumePeople += (s.consumePeople || 0);

                    yStats.achievedRate = yStats.monthlyGoal ? (yStats.monthlyAchieved / yStats.monthlyGoal) * 100 : 0;
                    yStats.cardRate = yStats.monthlyAchieved ? Math.round((yStats.cardSales / yStats.monthlyAchieved) * 100) : 0;
                    yStats.dealRate = yStats.totalVisits ? Math.round((yStats.payingCustomers / yStats.totalVisits) * 100) : 0;
                    yStats.avgTicket = yStats.payingCustomers ? Math.round(yStats.monthlyAchieved / yStats.payingCustomers) : 0;
                    yStats.newDealRate = yStats.newVisits ? Math.round((yStats.newDeals / yStats.newVisits) * 100) : 0;
                    yStats.newAvgTicket = yStats.newDeals ? Math.round(yStats.newAmount / yStats.newDeals) : 0;
                    yStats.oldDealRate = yStats.oldVisits ? Math.round((yStats.oldDeals / yStats.oldVisits) * 100) : 0;
                    yStats.oldAvgTicket = yStats.oldDeals ? Math.round(yStats.oldAmount / yStats.oldDeals) : 0;

                    bData["年度"] = yStats;
                }

                return (order[a] || 50) - (order[b] || 50);
            });

            return { branches, periods: finalPeriods, branchOrder };

        const parseStaffSheet = (sheet) => {
            const data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null });
            if (!data || data.length < 5) return null;
            let staffRowIdx = -1;
            for(let i=0; i<Math.min(data.length, 20); i++) {
                if(JSON.stringify(data[i]).includes("店長") || JSON.stringify(data[i]).includes("諮詢")) {
                    staffRowIdx = i;
                    break;
                }
            }
            if(staffRowIdx === -1) staffRowIdx = 2; 
            const branchRowIdx = staffRowIdx - 1;
            const branchRow = data[branchRowIdx];
            const staffRow = data[staffRowIdx];
            const joinDateRow = data[staffRowIdx + 1]; 
            const staffList = [];
            const colToStaff = {}; 
            let currentBranch = null;
            if(Array.isArray(staffRow)) {
                for (let c = 0; c < staffRow.length; c++) {
                    if (branchRow && branchRow[c]) {
                        let bRaw = String(branchRow[c]);
                        if (bRaw.includes('\n')) bRaw = bRaw.split('\n')[0];
                        currentBranch = bRaw.trim();
                    }
                    const sRaw = staffRow[c];
                    if (sRaw && String(sRaw).includes('\n')) {
                        let name = String(sRaw);
                        let role = "人員";
                        if (name.includes('-(')) {
                            const parts = name.split('-(');
                            name = parts[0].trim();
                            let rolePart = parts[1] || "";
                            rolePart = rolePart.replace(/^[A-Z0-9]+\)/, ''); 
                            role = rolePart.replace(/\n/g, '').trim();
                        } else if (name.includes('\n')) {
                            const parts = name.split('\n');
                            name = parts[0].trim();
                            role = parts[1].trim();
                        }
                        let seniorityInfo = { text: "未知", years: 0 };
                        if (joinDateRow && joinDateRow[c]) seniorityInfo = calculateSeniorityInfo(joinDateRow[c]);
                        if (name && currentBranch) {
                            colToStaff[c] = { name, role, branch: currentBranch, seniority: seniorityInfo.text, seniorityYears: seniorityInfo.years, stats: {} };
                            staffList.push(colToStaff[c]);
                        }
                    }
                }
            }
            for (let i = staffRowIdx + 2; i < data.length; i++) {
                const row = data[i];
                if (!row) continue;
                const metricName = row[1]; 
                if (metricName && METRIC_MAP[metricName.trim()]) {
                    const key = METRIC_MAP[metricName.trim()];
                    Object.keys(colToStaff).forEach(colIdx => {
                        const val = row[colIdx];
                        let numVal = cleanNumber(val);
                        if ((key.includes('Rate') || key.includes('比率')) && Math.abs(numVal) <= 10.0 && numVal !== 0) numVal = numVal * 100;
                        colToStaff[colIdx].stats[key] = numVal;
                    });

            return staffList;

            const [isBranchFilterOpen, setIsBranchFilterOpen] = useState(false);
            
            const [rankRange, setRankRange] = useState('all');
            
            const [selectedSeniorityRanges, setSelectedSeniorityRanges] = useState([]);
            const [isSeniorityFilterOpen, setIsSeniorityFilterOpen] = useState(false);

            const fileInputRef = useRef(null);
            const dashboardRef = useRef(null);
            
            // Initial Mock Data
            const mockData = useMemo(() => {
                 return [{
                    branchName: "範例-台北旗艦店",
                    stats: { monthlyGoal: 5000000, monthlyAchieved: 3850000, achievedRate: 77, cardSales: 1200000, cardRate: 31, totalVisits: 450, payingCustomers: 380, dealRate: 84, avgTicket: 10131, newVisits: 120, newDeals: 60, newDealRate: 50, newAmount: 900000, newAvgTicket: 15000, oldVisits: 330, oldDeals: 320, oldDealRate: 97, oldAmount: 2950000, oldAvgTicket: 9218, consumeAmount: 2100000, consumePeople: 300, consumeAvg: 7000 },
                    staff: [{ name: "林雅婷", role: "資深諮詢", branch: "台北旗艦店", seniority: "1年2個月", seniorityYears: 1.16, stats: { totalSales: 1200000, monthlySales: 800000, productSales: 150000, cardSales: 400000, cardRate: 33, totalVisits: 120, payingCustomers: 100, dealRate: 83, avgTicket: 8000, newVisits: 20, newDeals: 15, newDealRate: 75, newAmount: 300000, newAvgTicket: 20000, oldVisits: 100, oldDeals: 85, oldDealRate: 85, oldAmount: 500000, oldAvgTicket: 5882, consumeAmount: 600000, consumePeople: 80, consumeAvg: 7500 }, ranks: { cardRate: 'top1', dealRate: 'top1' }, globalRank: 1 }],
                    ranks: { cardRate: 'top1', dealRate: 'top2' }
                }];
            }, []);

            useEffect(() => {
                if (window.auth) {
                    const initAuth = async () => {
                        if (window.__initial_auth_token) await window.signInWithCustomToken(window.auth, window.__initial_auth_token);
                        else await window.signInAnonymously(window.auth);
                    };
                    initAuth();
                    window.onAuthStateChanged(window.auth, (u) => setUser(u));
                }
            }, []);

            useEffect(() => {
                if (user && window.db) {
                    const docRef = window.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'dashboard_save', 'main');
                    const unsubscribe = window.onSnapshot(docRef, (docSnap) => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            if (data.branchData && data.staffData) {
                                setParsedData(data);
                                setAvailablePeriods(data.periods);
                                if (!data.periods.includes(selectedPeriod)) setSelectedPeriod(data.periods[data.periods.length - 1]);
                            }
                        }
                    });
                    return () => unsubscribe();
                }
            }, [user]);

            useEffect(() => {
                if (parsedData && parsedData.staffData) {
                    const roles = [...new Set(parsedData.staffData.map(s => s.role))].filter(Boolean);
                    setAvailableRoles(roles);
                    if (selectedRoles.length === 0) setSelectedRoles(roles);
                    
                    const branches = parsedData.branchData.branchOrder || Object.keys(parsedData.branchData.branches);
                    setAvailableBranches(branches);
                    if (selectedFilterBranches.length === 0) setSelectedFilterBranches(branches);
                    
                    if (selectedSeniorityRanges.length === 0) {
                        setSelectedSeniorityRanges(SENIORITY_RANGES.map(r => r.id));
                    }
                }
            }, [parsedData]);

            const activeData = useMemo(() => {
                if (!parsedData) return mockData;

                const { branchData, staffData, periods } = parsedData;
                const branchNames = branchData.branchOrder && branchData.branchOrder.length > 0 
                    ? branchData.branchOrder : Object.keys(branchData.branches);

                const allBranchStructure = branchNames.map(bName => ({
                    branchName: bName,
                    staff: staffData.filter(s => s.branch === bName)
                }));
                
                let allStaffFlat = [];
                allBranchStructure.forEach(b => {
                    b.staff.forEach(s => {
                        const sales = s.stats.totalSales || s.stats.monthlySales || 0;
                        allStaffFlat.push({ ...s, rawSales: sales, branchName: b.branchName });
                    });
                });
                allStaffFlat.sort((a, b) => b.rawSales - a.rawSales);
                
                const globalSalesRankMap = {};
                allStaffFlat.forEach((s, idx) => {
                    globalSalesRankMap[`${s.name}_${s.branchName}`] = idx + 1;
                });
                
                const branchList = branchNames.map(bName => ({
                    branchName: bName,
                    stats: branchData.branches[bName][selectedPeriod] || {}
                }));
                const rankedBranchList = calculateRankings(branchList, 1);

                const finalBranchTabs = rankedBranchList.map(branch => {
                    const myStaff = staffData.filter(s => s.branch === branch.branchName);
                    const rankedStaff = calculateRankings(myStaff, 3);
                    const staffFinal = rankedStaff.map(s => {
                        const key = `${s.name}_${s.branch}`;
                        return { ...s, globalSalesRank: globalSalesRankMap[key] };
                    });
                    return { ...branch, staff: staffFinal, isGlobalRanking: false, isTotalOverview: false };
                });

                const totalStats = {
                    monthlyGoal: 0, monthlyAchieved: 0, cardSales: 0,
                    totalVisits: 0, payingCustomers: 0,
                    newVisits: 0, newDeals: 0, newAmount: 0,
                    oldVisits: 0, oldDeals: 0, oldAmount: 0,
                    consumeAmount: 0, consumePeople: 0
                };
                
                branchList.forEach(b => {
                    const s = b.stats;
                    totalStats.monthlyGoal += s.monthlyGoal || 0;
                    totalStats.monthlyAchieved += s.monthlyAchieved || 0;
                    totalStats.cardSales += s.cardSales || 0;
                    totalStats.totalVisits += s.totalVisits || 0;
                    totalStats.payingCustomers += s.payingCustomers || 0;
                    totalStats.newVisits += s.newVisits || 0;
                    totalStats.newDeals += s.newDeals || 0;
                    totalStats.newAmount += s.newAmount || 0;
                    totalStats.oldVisits += s.oldVisits || 0;
                    totalStats.oldDeals += s.oldDeals || 0;
                    totalStats.oldAmount += s.oldAmount || 0;
                    totalStats.consumeAmount += s.consumeAmount || 0;
                    totalStats.consumePeople += s.consumePeople || 0;
                });

                const totalDerived = {
                    ...totalStats,
                    achievedRate: totalStats.monthlyGoal ? (totalStats.monthlyAchieved / totalStats.monthlyGoal) * 100 : 0,
                    cardRate: totalStats.monthlyAchieved ? Math.round((totalStats.cardSales / totalStats.monthlyAchieved) * 100) : 0,
                    dealRate: totalStats.totalVisits ? Math.round((totalStats.payingCustomers / totalStats.totalVisits) * 100) : 0,
                    avgTicket: totalStats.payingCustomers ? Math.round(totalStats.monthlyAchieved / totalStats.payingCustomers) : 0,
                    newDealRate: totalStats.newVisits ? Math.round((totalStats.newDeals / totalStats.newVisits) * 100) : 0,
                    newAvgTicket: totalStats.newDeals ? Math.round(totalStats.newAmount / totalStats.newDeals) : 0,
                    oldDealRate: totalStats.oldVisits ? Math.round((totalStats.oldDeals / totalStats.oldVisits) * 100) : 0,
                    oldAvgTicket: totalStats.oldDeals ? Math.round(totalStats.oldAmount / totalStats.oldDeals) : 0,
                    consumeAvg: totalStats.consumePeople ? Math.round(totalStats.consumeAmount / totalStats.consumePeople) : 0
                };
                
                const totalOverviewTab = {
                    branchName: "營運績效總表",
                    isTotalOverview: true,
                    isGlobalRanking: false,
                    stats: totalDerived,
                    staff: [], 
                    ranks: {}
                };

                const filteredGlobalStaff = allStaffFlat.filter(s => {
                    const roleMatch = selectedRoles.includes(s.role);
                    const branchMatch = selectedFilterBranches.includes(s.branchName);
                    
                    const currentRank = globalSalesRankMap[`${s.name}_${s.branchName}`];
                    let rankMatch = true;
                    if (rankRange !== 'all') {
                        const limit = parseInt(rankRange);
                        rankMatch = currentRank <= limit;
                    }

                    let seniorityMatch = false;
                    if (selectedSeniorityRanges.length === 0 || selectedSeniorityRanges.length === SENIORITY_RANGES.length) {
                        seniorityMatch = true;
                    } else {
                        const y = s.seniorityYears || 0;
                        seniorityMatch = selectedSeniorityRanges.some(rangeId => {
                            const range = SENIORITY_RANGES.find(r => r.id === rangeId);
                            if(!range) return false;
                            return y >= range.min && y < range.max;
                        });
                    }

                    return roleMatch && branchMatch && rankMatch && seniorityMatch;
                });
                
                const flatStaffForMetricRanking = filteredGlobalStaff.map(s => ({
                    name: s.name, branch: s.branchName, stats: s.stats, ranks: {} 
                }));
                const dynamicGlobalMetricRanks = calculateRankings(flatStaffForMetricRanking, 5);
                const dynamicGlobalMetricRankMap = {};
                dynamicGlobalMetricRanks.forEach(s => {
                    dynamicGlobalMetricRankMap[`${s.name}_${s.branch}`] = s.ranks;
                });

                const globalRankTab = {
                    branchName: "業務人員績效排名",
                    isGlobalRanking: true,
                    stats: null,
                    staff: filteredGlobalStaff.map(s => {
                        const key = `${s.name}_${s.branchName}`;
                        return {
                            ...s, branch: s.branchName,
                            globalSalesRank: globalSalesRankMap[key],
                            ranks: dynamicGlobalMetricRankMap[key] || {}
                        };
                    })
                };

                return [...finalBranchTabs, totalOverviewTab, globalRankTab];

            }, [parsedData, selectedPeriod, selectedRoles, selectedFilterBranches, rankRange, selectedSeniorityRanges]);

            const activeBranch = activeData[activeBranchIndex] || activeData[0];

            if (!parsedData && !activeBranch) return <div className="p-10 text-center">資料載入中...</div>;

            // Handlers
            const handleImportClick = () => { setIsPasswordModalOpen(true); setPasswordInput(""); setPasswordError(false); };
            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                if (passwordInput === "8888") { setIsPasswordModalOpen(false); if(fileInputRef.current) fileInputRef.current.click(); } 
                else { setPasswordError(true); }
            };
            const handleFileUpload = (e) => { 
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const wb = XLSX.read(evt.target.result, { type: 'binary' });
                        if (wb.SheetNames.length < 2) throw new Error("請確認 Excel 包含工作表1(分店)與工作表2(人員)");
                        const branchParsed = parseBranchSheet(wb.Sheets[wb.SheetNames[0]]);
                        const staffParsed = parseStaffSheet(wb.Sheets[wb.SheetNames[1]]);
                        
                        if (branchParsed && staffParsed) {
                            const newData = { branchData: branchParsed, staffData: staffParsed, periods: branchParsed.periods };
                            setParsedData(newData);
                            setAvailablePeriods(branchParsed.periods);
                            setSelectedPeriod(branchParsed.periods[branchParsed.periods.length - 1]);
                            setActiveBranchIndex(0);

                            if (user && window.db) {
                                setIsSaving(true);
                                try {
                                    const docRef = window.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'dashboard_save', 'main');
                                    await window.setDoc(docRef, JSON.parse(JSON.stringify(newData)));
                                    alert("資料已同步至雲端！");
                                } catch (err) {
                                    console.error(err);
                                    alert("雲端同步失敗");
                                } finally {
                                    setIsSaving(false);
                                }
                            }
                        } else {
                            throw new Error("格式讀取失敗");
                        }
                    } catch (err) {
                        alert("讀取錯誤: " + err.message);
                    }
                };
                reader.readAsBinaryString(file);
            };

            const handleExportImage = async () => { 
                if (dashboardRef.current) {
                    const originalWidth = dashboardRef.current.style.width;
                    const originalMaxWidth = dashboardRef.current.style.maxWidth;
                    
                    // 強制設定寬度，確保截圖排版為完美桌機比例
                    dashboardRef.current.style.width = '1400px';
                    dashboardRef.current.style.maxWidth = '1400px';
                    
                    try {
                        const canvas = await html2canvas(dashboardRef.current, { 
                            scale: 2, 
                            backgroundColor: '#f8fafc', 
                            useCORS: true,
                            width: 1400,
                            windowWidth: 1400
                        });
                        const link = document.createElement('a');
                        link.download = `${activeBranch.branchName}_${selectedPeriod}_營運績效.png`;
                        link.href = canvas.toDataURL('image/png', 1.0);
                        link.click();
                    } finally {
                        // 恢復原本設定
                        dashboardRef.current.style.width = originalWidth;
                        dashboardRef.current.style.maxWidth = originalMaxWidth;
                    }
                }
            };

            // Toggle handlers
            const toggleRole = (role) => {
                if (selectedRoles.includes(role)) setSelectedRoles(selectedRoles.filter(r => r !== role));
                else setSelectedRoles([...selectedRoles, role]);
            };
            const toggleAllRoles = () => {
                if (selectedRoles.length === availableRoles.length) setSelectedRoles([]);
                else setSelectedRoles(availableRoles);
            };
            const toggleBranch = (branch) => {
                if (selectedFilterBranches.includes(branch)) setSelectedFilterBranches(selectedFilterBranches.filter(b => b !== branch));
                else setSelectedFilterBranches([...selectedFilterBranches, branch]);
            };
            const toggleAllBranches = () => {
                if (selectedFilterBranches.length === availableBranches.length) setSelectedFilterBranches([]);
                else setSelectedFilterBranches(availableBranches);
            };
            
            const toggleSeniority = (rangeId) => {
                if (selectedSeniorityRanges.includes(rangeId)) setSelectedSeniorityRanges(selectedSeniorityRanges.filter(r => r !== rangeId));
                else setSelectedSeniorityRanges([...selectedSeniorityRanges, rangeId]);
            };
            const toggleAllSeniority = () => {
                 if (selectedSeniorityRanges.length === SENIORITY_RANGES.length) setSelectedSeniorityRanges([]);
                 else setSelectedSeniorityRanges(SENIORITY_RANGES.map(r => r.id));
            };

            return (
                <div className="min-h-screen pb-10 font-sans text-slate-800">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
                        <div className="container mx-auto px-4 h-16 flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <img 
                                    src={logoUrl} 
                                    alt="Logo" 
                                    className="logo-img h-10 w-auto"
                                    onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }}
                                />
                                <div className="bg-medical-600 text-white p-1.5 rounded-lg shadow-sm" style={{display: 'none'}}><Icon icon="Activity" size={24} /></div>
                                <h1 className="text-xl font-black tracking-tight text-slate-800 hidden md:block">營運年度績效</h1>
                                <div className="hidden lg:flex items-center ml-4 px-3 py-1 rounded-full text-xs font-bold bg-slate-100 text-slate-500">
                                    {isSaving ? <><span className="w-2 h-2 rounded-full bg-blue-500 animate-pulse mr-2"></span> 上傳中...</> : user ? <><span className="w-2 h-2 rounded-full bg-green-500 mr-2"></span> 雲端已連線</> : <><span className="w-2 h-2 rounded-full bg-gray-400 mr-2"></span> 離線模式</>}
                                </div>
                            </div>
                            <div className="flex items-center space-x-3">
                                <div className="flex items-center bg-slate-50 rounded-lg px-2 py-1.5 border border-slate-200">
                                    <span className="text-xs text-slate-400 font-bold mr-2 uppercase hidden sm:inline">Period</span>
                                    <select value={selectedPeriod} onChange={(e) => setSelectedPeriod(e.target.value)} className="bg-transparent font-bold text-sm outline-none cursor-pointer text-medical-800">
                                        {availablePeriods.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                </div>
                                <button onClick={handleImportClick} className="bg-white hover:bg-slate-50 text-slate-600 border border-slate-200 px-3 py-1.5 rounded-lg text-sm font-bold flex items-center transition shadow-sm"><Icon icon="Upload" size={16} className="mr-1.5" /> 匯入</button>
                                <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} accept=".xlsx,.xls"/>
                                <button onClick={handleExportImage} className="bg-medical-600 hover:bg-medical-700 text-white px-3 py-1.5 rounded-lg text-sm font-bold flex items-center shadow transition transform hover:-translate-y-0.5"><Icon icon="Camera" size={16} className="mr-1.5" /> 截圖</button>
                            </div>
                        </div>
                        <div className="bg-slate-50 border-b border-slate-200">
                            <div className="container mx-auto px-4 flex space-x-2 overflow-x-auto scrollbar-hide py-1">
                                {activeData.map((branch, idx) => (
                                    <button key={idx} onClick={() => setActiveBranchIndex(idx)}
                                        className={`py-2 px-4 text-sm font-bold rounded-t-lg transition-all whitespace-nowrap ${
                                            idx === activeBranchIndex 
                                            ? 'bg-white text-medical-700 border-t-4 border-medical-500 shadow-sm' 
                                            : 'text-slate-400 hover:text-slate-600 hover:bg-slate-100'
                                        } ${branch.isGlobalRanking ? 'bg-amber-50 text-amber-700 border-amber-500' : ''} ${branch.isTotalOverview ? 'bg-blue-50 text-blue-700 border-blue-500' : ''}`}>
                                        {branch.isGlobalRanking && <Icon icon="Trophy" size={14} className="mr-1 inline-block" />}
                                        {branch.isTotalOverview && <Icon icon="BarChart3" size={14} className="mr-1 inline-block" />}
                                        {branch.branchName}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="container mx-auto px-4 py-6 max-w-[1400px]" id="dashboard-container" ref={dashboardRef}>
                        <div className="mb-4 flex items-center justify-between border-b border-slate-200 pb-2">
                             <div className="flex items-baseline">
                                <h2 className="text-3xl font-black text-slate-800 tracking-tight mr-3">{activeBranch.branchName}</h2>
                                {activeBranch.isGlobalRanking ? (
                                    <span className="text-lg font-bold text-slate-400">({activeBranch.staff.length})</span>
                                ) : (
                                    <span className="text-lg font-bold text-slate-400">營運總覽</span>
                                )}
                             </div>
                             
                             {activeBranch.isGlobalRanking && (
                                <div className="flex space-x-2">
                                    {/* Branch Filter */}
                                    <div className="relative">
                                        <button onClick={() => { setIsBranchFilterOpen(!isBranchFilterOpen); setIsRoleFilterOpen(false); setIsSeniorityFilterOpen(false); }} className="flex items-center px-3 py-2 bg-white border border-slate-300 rounded-lg text-sm font-bold text-slate-700 hover:bg-slate-50 shadow-sm">
                                            <Icon icon="MapPin" size={16} className="mr-2"/> 分店 ({selectedFilterBranches.length})
                                        </button>
                                        {isBranchFilterOpen && (
                                            <div className="filter-dropdown-menu">
                                                <div className="flex items-center justify-between mb-2 pb-2 border-b border-slate-100">
                                                    <span className="text-xs font-bold text-slate-500">選擇分店</span>
                                                    <button onClick={toggleAllBranches} className="text-xs text-medical-600 font-bold hover:underline">{selectedFilterBranches.length === availableBranches.length ? '取消' : '全選'}</button>
                                                </div>
                                                <div className="space-y-1">
                                                    {availableBranches.map(b => (
                                                        <label key={b} className="flex items-center px-2 py-1.5 hover:bg-slate-50 rounded cursor-pointer">
                                                            <input type="checkbox" checked={selectedFilterBranches.includes(b)} onChange={() => toggleBranch(b)} className="rounded border-slate-300 text-medical-600 mr-2"/>
                                                            <span className="text-sm text-slate-700 font-medium">{b}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Role Filter */}
                                    <div className="relative">
                                        <button onClick={() => { setIsRoleFilterOpen(!isRoleFilterOpen); setIsBranchFilterOpen(false); setIsSeniorityFilterOpen(false); }} className="flex items-center px-3 py-2 bg-white border border-slate-300 rounded-lg text-sm font-bold text-slate-700 hover:bg-slate-50 shadow-sm">
                                            <Icon icon="Filter" size={16} className="mr-2"/> 職稱 ({selectedRoles.length})
                                        </button>
                                        {isRoleFilterOpen && (
                                            <div className="filter-dropdown-menu">
                                                <div className="flex items-center justify-between mb-2 pb-2 border-b border-slate-100">
                                                    <span className="text-xs font-bold text-slate-500">選擇職稱</span>
                                                    <button onClick={toggleAllRoles} className="text-xs text-medical-600 font-bold hover:underline">{selectedRoles.length === availableRoles.length ? '取消' : '全選'}</button>
                                                </div>
                                                <div className="space-y-1">
                                                    {availableRoles.map(role => (
                                                        <label key={role} className="flex items-center px-2 py-1.5 hover:bg-slate-50 rounded cursor-pointer">
                                                            <input type="checkbox" checked={selectedRoles.includes(role)} onChange={() => toggleRole(role)} className="rounded border-slate-300 text-medical-600 mr-2"/>
                                                            <span className="text-sm text-slate-700 font-medium">{role}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    
                                    {/* Seniority Filter */}
                                    <div className="relative">
                                        <button onClick={() => { setIsSeniorityFilterOpen(!isSeniorityFilterOpen); setIsBranchFilterOpen(false); setIsRoleFilterOpen(false); }} className="flex items-center px-3 py-2 bg-white border border-slate-300 rounded-lg text-sm font-bold text-slate-700 hover:bg-slate-50 shadow-sm">
                                            <Icon icon="Clock" size={16} className="mr-2"/> 年資 ({selectedSeniorityRanges.length})
                                        </button>
                                        {isSeniorityFilterOpen && (
                                            <div className="filter-dropdown-menu">
                                                <div className="flex items-center justify-between mb-2 pb-2 border-b border-slate-100">
                                                    <span className="text-xs font-bold text-slate-500">選擇年資</span>
                                                    <button onClick={toggleAllSeniority} className="text-xs text-medical-600 font-bold hover:underline">{selectedSeniorityRanges.length === SENIORITY_RANGES.length ? '取消' : '全選'}</button>
                                                </div>
                                                <div className="space-y-1">
                                                    {SENIORITY_RANGES.map(range => (
                                                        <label key={range.id} className="flex items-center px-2 py-1.5 hover:bg-slate-50 rounded cursor-pointer">
                                                            <input type="checkbox" checked={selectedSeniorityRanges.includes(range.id)} onChange={() => toggleSeniority(range.id)} className="rounded border-slate-300 text-medical-600 mr-2"/>
                                                            <span className="text-sm text-slate-700 font-medium">{range.label}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Rank Range Filter */}
                                    <div className="relative">
                                        <div className="flex items-center bg-white border border-slate-300 rounded-lg px-3 py-2 shadow-sm">
                                            <Icon icon="ListOrdered" size={16} className="mr-2 text-slate-500"/>
                                            <select 
                                                value={rankRange} 
                                                onChange={(e) => setRankRange(e.target.value)} 
                                                className="bg-transparent font-bold text-sm outline-none cursor-pointer text-slate-700"
                                            >
                                                <option value="all">全部排名</option>
                                                <option value="10">Top 10</option>
                                                <option value="20">Top 20</option>
                                                <option value="30">Top 30</option>
                                                <option value="40">Top 40</option>
                                                <option value="50">Top 50</option>
                                                <option value="100">Top 100</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                             )}
                        </div>

                        {!activeBranch.isGlobalRanking && (
                             <>
                                {/* 版面修正核心區域：改用 lg:grid-cols-4 完美實現 1:1:2 的比例配置 */}
                                <div className="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-4">
                                    <div className="stat-card lg:col-span-1">
                                        <div className="card-header border-l-4 border-l-medical-500"><Icon icon="BadgeDollarSign" className="mr-2 text-medical-600"/> 營收狀況</div>
                                        <div className="card-content flex flex-col justify-between">
                                            <RevenueProgress goal={activeBranch.stats.monthlyGoal} achieved={activeBranch.stats.monthlyAchieved} rate={activeBranch.stats.achievedRate} />
                                            <div className="grid grid-cols-2 gap-3">
                                                <StatBox label="開卡業績" value={activeBranch.stats.cardSales} isMoney />
                                                <StatBox label="開卡比率" value={activeBranch.stats.cardRate} isPercent rank={activeBranch.ranks?.cardRate} />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="stat-card lg:col-span-1">
                                        <div className="card-header border-l-4 border-l-slate-500"><Icon icon="Store" className="mr-2 text-slate-600"/> 顧客到店</div>
                                        <div className="card-content grid grid-cols-2 gap-3">
                                            <StatBox label="到店來客數" value={activeBranch.stats.totalVisits} />
                                            <StatBox label="到店消費人數" value={activeBranch.stats.payingCustomers} />
                                            <StatBox label="平均成交率" value={activeBranch.stats.dealRate} isPercent highlight rank={activeBranch.ranks?.dealRate} />
                                            <StatBox label="總平均客單" value={activeBranch.stats.avgTicket} isMoney highlight rank={activeBranch.ranks?.avgTicket} />
                                        </div>
                                    </div>
                                    <div className="stat-card lg:col-span-2">
                                        <div className="card-header border-l-4 border-l-orange-400"><Icon icon="Users" className="mr-2 text-orange-500"/> 新舊客分析</div>
                                        <div className="card-content grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <NewOldList type="new" stats={activeBranch.stats} ranks={activeBranch.ranks} />
                                            <NewOldList type="old" stats={activeBranch.stats} ranks={activeBranch.ranks} />
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-3 mb-8 flex flex-wrap justify-between items-center">
                                     <div className="flex items-center text-slate-700 font-bold ml-2"><Icon icon="TrendingDown" size={20} className="mr-2 text-slate-400"/> 課程消耗狀況</div>
                                     <div className="flex space-x-8 mr-4 text-sm">
                                        <div className="flex items-baseline"><span className="text-slate-400 mr-2 font-bold">當月消耗</span><span className="text-xl font-bold text-slate-800">{formatMoney(activeBranch.stats.consumeAmount)}</span></div>
                                        <div className="flex items-baseline"><span className="text-slate-400 mr-2 font-bold">人數</span><span className="text-xl font-bold text-slate-800">{activeBranch.stats.consumePeople || 0}</span></div>
                                        <div className="flex items-baseline"><span className="text-slate-400 mr-2 font-bold">平均</span><span className="text-xl font-bold text-slate-800">{formatMoney(activeBranch.stats.consumeAvg)}</span></div>
                                     </div>
                                </div>
                                
                                {/* 僅在「營運績效總表」分頁顯示各店營收達成總表 */}
                                {activeBranch.isTotalOverview && (
                                    <OverviewDataTable parsedData={parsedData} availablePeriods={availablePeriods} />
                                )}
                            </>
                        )}

                        {!activeBranch.isTotalOverview && (
                            <div className="flex items-center mb-6">
                                <h3 className="text-xl font-black text-slate-700 mr-4">
                                    {activeBranch.isGlobalRanking ? "全體業務績效排行 (依總銷售業績)" : "年度人員績效"}
                                </h3>
                                <div className="h-px bg-slate-200 flex-1"></div>
                            </div>
                        )}

                        {!activeBranch.isTotalOverview && (
                            <div>
                                {activeBranch.staff && activeBranch.staff.map((member, idx) => (
                                    <StaffCard 
                                        key={idx} 
                                        staff={member} 
                                        globalSalesRank={member.globalSalesRank}
                                        showBranch={activeBranch.isGlobalRanking} 
                                    />
                                ))}
                                {(!activeBranch.staff || activeBranch.staff.length === 0) && (
                                    <div className="p-8 text-center bg-white rounded-lg border-2 border-dashed border-slate-300">
                                        <p className="text-lg text-slate-400 font-bold">暫無人員資料</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {isPasswordModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[60] backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm transform transition-all scale-100 border border-gray-200">
                                <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center"><Icon icon="Lock" size={20} className="mr-2 text-medical-600"/>管理員驗證</h3>
                                <p className="text-sm text-gray-500 mb-4">請輸入密碼以進行資料匯入操作。</p>
                                <form onSubmit={handlePasswordSubmit}>
                                    <input type="password" autoFocus value={passwordInput} onChange={(e) => { setPasswordInput(e.target.value); setPasswordError(false); }} placeholder="請輸入密碼" className={`w-full border rounded-lg px-4 py-2 outline-none focus:ring-2 mb-2 ${passwordError ? 'border-red-500 focus:ring-red-200' : 'border-gray-300 focus:ring-medical-200'}`}/>
                                    {passwordError && <p className="text-xs text-red-500 mb-2 font-bold flex items-center"><Icon icon="AlertCircle" size={12} className="mr-1"/>密碼錯誤，請重試。</p>}
                                    <div className="flex justify-end space-x-2 mt-4">
                                        <button type="button" onClick={() => setIsPasswordModalOpen(false)} className="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded-lg text-sm font-bold">取消</button>
                                        <button type="submit" className="px-4 py-2 bg-medical-600 hover:bg-medical-700 text-white rounded-lg text-sm font-bold shadow-md transition-transform active:scale-95">確認</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <footer className="text-center text-slate-400 text-xs py-8 border-t border-slate-200 bg-white mt-8 font-bold">
                        營運年度績效 &copy; 2026 美加醫美 MEGAIA
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
